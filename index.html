<title>Feladatok</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Inter:wght@400;500;600&display=swap');
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root{
  --bg:#F3F3EF; --surface:#FFFFFF; --surface-2:#FAFAF8;
  --ink:#1A211D; --ink-soft:#5E6862; --ink-faint:#9AA39D;
  --brand:#0E7A63; --brand-soft:#E3F2EC; --amber:#E0962A; --amber-soft:#FBEFD8;
  --danger:#C0432B; --line:#E8E8E2;
  --shadow:0 1px 2px rgba(20,30,25,.06), 0 8px 22px rgba(20,30,25,.06);
}
html,body{ height:100%; }
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink);
  height:100dvh; overflow:hidden; -webkit-font-smoothing:antialiased;
}
.ic{ display:block; }
#app{ display:flex; height:100dvh; position:relative; }

/* fő terület */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; max-width:760px; margin:0 auto; width:100%; }
.header{ display:flex; align-items:flex-start; gap:12px; padding:max(18px,env(safe-area-inset-top)) 18px 10px; }
.menu{ flex:none; width:42px; height:42px; border:none; background:var(--surface); border-radius:13px; color:var(--ink);
  display:grid; place-items:center; box-shadow:var(--shadow); cursor:pointer; transition:transform .12s; }
.menu:active{ transform:scale(.93); }
.titlewrap{ padding-top:2px; min-width:0; }
.title{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:30px; line-height:1.05;
  letter-spacing:-.02em; display:flex; align-items:center; gap:10px; }
.titleicon{ display:inline-flex; color:var(--brand); }
.titledot{ width:13px; height:13px; border-radius:50%; }
.sub{ margin-top:5px; color:var(--ink-soft); font-size:13.5px; font-weight:500; }

.scroll{ flex:1; overflow-y:auto; padding:6px 12px 12px; -webkit-overflow-scrolling:touch; }
.tasklist{ list-style:none; display:flex; flex-direction:column; gap:8px; }

.task{ display:flex; align-items:center; gap:11px; background:var(--surface); border-radius:15px;
  padding:13px 13px 13px 14px; box-shadow:var(--shadow); animation:tkin .22s ease; }
@keyframes tkin{ from{ opacity:0; transform:translateY(6px);} }
.task.done-row{ background:var(--surface-2); box-shadow:none; }
.check{ flex:none; width:24px; height:24px; border-radius:50%; border:2px solid var(--ink-faint);
  background:transparent; cursor:pointer; display:grid; place-items:center; color:#fff; transition:.18s; }
.check .ic{ opacity:0; transform:scale(.4); transition:.18s; }
.check.on{ background:var(--brand); border-color:var(--brand); animation:tkpop .28s ease; }
.check.on .ic{ opacity:1; transform:scale(1); }
@keyframes tkpop{ 0%{ transform:scale(1);} 45%{ transform:scale(1.22);} 100%{ transform:scale(1);} }
.taskbody{ flex:1; min-width:0; text-align:left; background:none; border:none; cursor:pointer; padding:2px 0; }
.tasktitle{ display:block; font-size:15.5px; line-height:1.32; color:var(--ink); word-break:break-word; }
.done-row .tasktitle{ color:var(--ink-faint); text-decoration:line-through; }
.meta{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:5px; }
.metalist{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; color:var(--ink-soft); font-weight:500; }
.dot{ width:9px; height:9px; border-radius:50%; flex:none; }
.dot.sm{ width:7px; height:7px; }
.due{ display:inline-flex; align-items:center; gap:3px; font-size:11.5px; font-weight:600; color:var(--ink-soft);
  background:var(--line); padding:2px 7px; border-radius:20px; }
.due .ic{ width:12px; height:12px; }
.due.today{ color:var(--brand); background:var(--brand-soft); }
.due.late{ color:var(--danger); background:#F6E1DC; }
.hasnote{ color:var(--ink-faint); display:inline-flex; }
.hasnote .ic{ width:11px; height:11px; }
.starbtn{ flex:none; background:none; border:none; cursor:pointer; color:var(--ink-faint); padding:5px;
  display:grid; place-items:center; transition:transform .12s, color .15s; }
.starbtn:active{ transform:scale(.85); }
.starbtn.on{ color:var(--amber); }

.donewrap{ margin-top:18px; }
.donehead{ display:flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer;
  color:var(--ink-soft); font-size:13px; font-weight:600; padding:6px 4px; }
.donehead .ic{ transition:transform .2s; transform:rotate(-90deg); width:16px; height:16px; }
.donehead.open .ic{ transform:rotate(0deg); }

.empty{ text-align:center; padding:54px 24px; color:var(--ink-soft); }
.emptyicon{ width:62px; height:62px; border-radius:20px; background:var(--surface); box-shadow:var(--shadow);
  display:grid; place-items:center; margin:0 auto 16px; color:var(--brand); }
.emptytitle{ font-family:'Bricolage Grotesque',sans-serif; font-weight:600; font-size:17px; color:var(--ink); }
.emptysub{ margin-top:6px; font-size:13.5px; max-width:280px; margin-inline:auto; line-height:1.45; }

.addbar{ display:flex; align-items:center; gap:10px; padding:12px 16px max(14px,env(safe-area-inset-bottom));
  background:linear-gradient(transparent, var(--bg) 28%); }
.addbtn{ flex:none; width:48px; height:48px; border-radius:16px; border:none; background:var(--brand); color:#fff;
  display:grid; place-items:center; cursor:pointer; box-shadow:0 6px 16px rgba(14,122,99,.32); transition:transform .12s; }
.addbtn:active{ transform:scale(.92); }
.addinput{ flex:1; height:48px; border-radius:16px; border:1px solid var(--line); background:var(--surface);
  padding:0 16px; font-size:15.5px; font-family:inherit; color:var(--ink); box-shadow:var(--shadow); outline:none; }
.addinput:focus{ border-color:var(--brand); }
.addinput::placeholder{ color:var(--ink-faint); }

.scrim{ position:absolute; inset:0; background:rgba(20,28,24,.34); opacity:0; pointer-events:none;
  transition:opacity .25s; z-index:20; -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); }
.scrim.on{ opacity:1; pointer-events:auto; }
.drawer{ position:absolute; top:0; left:0; bottom:0; width:84%; max-width:320px; background:var(--surface-2);
  z-index:30; transform:translateX(-102%); transition:transform .28s cubic-bezier(.22,.61,.36,1);
  display:flex; flex-direction:column; padding:max(16px,env(safe-area-inset-top)) 14px 14px; box-shadow:6px 0 28px rgba(20,30,25,.14); }
.drawer.on{ transform:translateX(0); }
.brand{ display:flex; align-items:center; justify-content:space-between; padding:4px 6px 14px; }
.logo{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:22px; letter-spacing:-.02em; }
.iconbtn{ background:none; border:none; color:var(--ink-soft); cursor:pointer; padding:6px; display:grid; place-items:center; }
.smart{ display:flex; flex-direction:column; gap:3px; }
.smartitem{ display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:12px; border:none;
  background:none; cursor:pointer; font-family:inherit; font-size:14.5px; font-weight:500; color:var(--ink); text-align:left; }
.smarticon{ display:inline-flex; }
.smartlabel{ flex:1; }
.smartitem.active{ background:var(--surface); box-shadow:var(--shadow); }
.divider{ height:1px; background:var(--line); margin:14px 8px; }
.listhead{ display:flex; align-items:center; justify-content:space-between; padding:2px 12px 8px; }
.listhead .lbl{ font-size:11.5px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); }
.edittoggle{ background:none; border:none; color:var(--brand); font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; }
.lists{ display:flex; flex-direction:column; gap:2px; overflow-y:auto; flex:1; }
.listrow{ display:flex; align-items:center; gap:4px; }
.listbtn{ flex:1; display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:11px; border:none;
  background:none; cursor:pointer; font-family:inherit; font-size:14.5px; color:var(--ink); text-align:left; }
.listbtn.active{ background:var(--surface); box-shadow:var(--shadow); }
.listname{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.badge{ font-size:11.5px; font-weight:600; color:var(--ink-soft); background:var(--line); border-radius:20px; padding:1px 8px; min-width:22px; text-align:center; }
.smartitem.active .badge, .listbtn.active .badge{ background:var(--bg); }
.listedit{ flex:1; border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-family:inherit; font-size:14px; background:var(--surface); color:var(--ink); outline:none; }
.deletelist{ flex:none; background:none; border:none; color:var(--danger); cursor:pointer; padding:8px; display:grid; place-items:center; }
.newlist{ display:flex; align-items:center; gap:8px; margin-top:8px; padding:10px 12px; border:1.5px dashed var(--line); border-radius:12px; color:var(--ink-faint); }
.newlist input{ flex:1; border:none; background:none; font-family:inherit; font-size:14px; color:var(--ink); outline:none; }
.drawerfoot{ padding-top:12px; }
.reset{ display:flex; align-items:center; gap:7px; background:none; border:none; color:var(--ink-faint); font-size:12.5px; cursor:pointer; font-family:inherit; padding:6px; }
.reset .ic{ width:15px; height:15px; }

.sheet{ position:absolute; left:0; right:0; bottom:0; z-index:30; background:var(--surface);
  border-radius:22px 22px 0 0; padding:10px 20px max(22px,env(safe-area-inset-bottom)); box-shadow:0 -12px 34px rgba(20,30,25,.16);
  animation:tkup .3s cubic-bezier(.22,.61,.36,1); max-width:760px; margin:0 auto; max-height:88dvh; overflow-y:auto; }
@keyframes tkup{ from{ transform:translateY(100%);} }
.grip{ width:38px; height:4px; border-radius:4px; background:var(--line); margin:2px auto 16px; }
.sheettop{ display:flex; align-items:flex-start; gap:12px; }
.detailtitle{ flex:1; border:none; outline:none; resize:none; font-family:'Bricolage Grotesque',sans-serif;
  font-weight:600; font-size:19px; line-height:1.3; color:var(--ink); background:none; }
.field{ margin-top:22px; }
.fieldlabel{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.04em; margin-bottom:9px; }
.fieldlabel .ic{ width:16px; height:16px; }
.duerow{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
.dateinput{ border:1px solid var(--line); border-radius:11px; padding:9px 12px; font-family:inherit; font-size:14.5px; color:var(--ink); background:var(--surface-2); outline:none; }
.dateinput:focus{ border-color:var(--brand); }
.chip{ border:1px solid var(--line); background:var(--surface-2); border-radius:20px; padding:8px 14px; font-family:inherit; font-size:13.5px; font-weight:500; color:var(--ink); cursor:pointer; }
.chip:active{ background:var(--brand-soft); border-color:var(--brand); }
.chip.ghost{ color:var(--danger); border-color:transparent; background:none; }
.note{ width:100%; min-height:88px; border:1px solid var(--line); border-radius:13px; padding:12px 14px;
  font-family:inherit; font-size:14.5px; line-height:1.5; color:var(--ink); background:var(--surface-2); outline:none; resize:vertical; }
.note:focus{ border-color:var(--brand); }
.note::placeholder{ color:var(--ink-faint); }
.sheetfoot{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:26px; }
.delete{ display:flex; align-items:center; gap:7px; background:none; border:none; color:var(--danger); font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; padding:6px 0; }
.delete .ic{ width:16px; height:16px; }
.done2{ background:var(--brand); color:#fff; border:none; border-radius:12px; padding:11px 24px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer; }
.done2:active{ transform:scale(.96); }
.grip{ flex:none; background:none; border:none; color:var(--ink-faint); padding:6px 2px; margin-left:-2px;
  display:grid; place-items:center; cursor:grab; touch-action:none; opacity:.65; }
.grip:active{ cursor:grabbing; }
.task.lift{ z-index:50; box-shadow:0 12px 28px rgba(20,30,25,.20); background:var(--surface); }
.task.lift .grip{ opacity:1; color:var(--ink-soft); }
.steplist{ list-style:none; display:flex; flex-direction:column; gap:2px; margin-bottom:4px; }
.step{ display:flex; align-items:center; gap:9px; padding:7px 4px; border-radius:9px; background:var(--surface); }
.step.lift{ box-shadow:0 10px 24px rgba(20,30,25,.18); z-index:50; }
.stepcheck{ flex:none; width:21px; height:21px; border-radius:50%; border:2px solid var(--ink-faint); background:transparent; cursor:pointer; display:grid; place-items:center; color:#fff; transition:.18s; }
.stepcheck .ic{ width:13px; height:13px; opacity:0; transform:scale(.4); transition:.18s; }
.stepcheck.on{ background:var(--brand); border-color:var(--brand); }
.stepcheck.on .ic{ opacity:1; transform:scale(1); }
.steptext{ flex:1; font-size:14.5px; color:var(--ink); line-height:1.32; word-break:break-word; }
.steptext.sdone{ color:var(--ink-faint); text-decoration:line-through; }
.stepdel{ flex:none; background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:4px; display:grid; place-items:center; }
.stepdel .ic{ width:15px; height:15px; }
.stepgrip{ flex:none; background:none; border:none; color:var(--ink-faint); padding:4px 2px; display:grid; place-items:center; cursor:grab; touch-action:none; opacity:.6; }
.stepgrip:active{ cursor:grabbing; }
.addstep{ display:flex; align-items:center; gap:9px; padding:2px 0; }
.addstepbtn{ flex:none; width:30px; height:30px; border-radius:9px; border:none; background:var(--brand-soft); color:var(--brand); display:grid; place-items:center; cursor:pointer; }
.addstepbtn .ic{ width:18px; height:18px; }
.stepinput{ flex:1; border:none; border-bottom:1px solid var(--line); background:none; padding:7px 2px; font-family:inherit; font-size:14.5px; color:var(--ink); outline:none; }
.stepinput:focus{ border-color:var(--brand); }
.stepinput::placeholder{ color:var(--ink-faint); }
.stepchip{ display:inline-flex; align-items:center; gap:3px; font-size:11.5px; font-weight:600; color:var(--ink-soft); background:var(--line); padding:2px 7px; border-radius:20px; }
.stepchip .ic{ width:12px; height:12px; }
.searchrow{ position:relative; padding:0 16px 10px; z-index:16; }
.searchwrap{ display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--line); border-radius:13px; padding:0 10px 0 12px; height:44px; box-shadow:var(--shadow); }
.searchwrap:focus-within{ border-color:var(--brand); }
.searchicon{ flex:none; color:var(--ink-faint); display:grid; place-items:center; }
.searchicon .ic{ width:18px; height:18px; }
#searchinput{ flex:1; border:none; background:none; font-family:inherit; font-size:15px; color:var(--ink); outline:none; height:100%; min-width:0; }
#searchinput::placeholder{ color:var(--ink-faint); }
.searchclear{ flex:none; background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:5px; display:none; }
.searchclear.show{ display:grid; place-items:center; }
.searchclear .ic{ width:16px; height:16px; }
.searchdrop{ position:absolute; left:16px; right:16px; top:48px; background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:0 12px 30px rgba(20,30,25,.16); max-height:52vh; overflow-y:auto; z-index:18; display:none; }
.searchdrop.show{ display:block; }
.sugg{ display:flex; align-items:center; gap:10px; padding:11px 13px; cursor:pointer; border-bottom:1px solid var(--line); }
.sugg:last-child{ border-bottom:none; }
.sugg:hover, .sugg.active{ background:var(--surface-2); }
.suggmain{ flex:1; min-width:0; }
.suggtitle{ font-size:14.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.suggtitle b{ color:var(--brand); font-weight:600; }
.suggtitle.sdone{ color:var(--ink-faint); text-decoration:line-through; }
.suggmeta{ font-size:11.5px; color:var(--ink-soft); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.suggsub{ font-size:11.5px; color:var(--ink-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.suggempty{ padding:16px 14px; text-align:center; color:var(--ink-faint); font-size:13.5px; }
.qfilter{ display:flex; gap:8px; overflow-x:auto; padding:0 16px 12px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.qfilter::-webkit-scrollbar{ display:none; }
.qchip{ flex:none; display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 13px; border-radius:20px; border:1px solid var(--line); background:var(--surface); color:var(--ink-soft); font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; box-shadow:var(--shadow); }
.qchip .ic{ width:14px; height:14px; }
.qchip.active{ background:var(--brand); border-color:var(--brand); color:#fff; }
.qchip .qcount{ font-size:12px; opacity:.7; }
.qchip.active .qcount{ opacity:.9; }
.qchip:active{ transform:scale(.96); }
.syncinfo{ display:flex; align-items:center; gap:9px; padding:9px 8px; font-size:13px; color:var(--ink-soft); }
.syncinfo.muted{ color:var(--ink-faint); }
.synctop{ font-weight:600; color:var(--ink); font-size:13px; }
.syncmail{ font-size:11.5px; color:var(--ink-faint); }
.syncdot{ width:9px; height:9px; border-radius:50%; background:var(--ink-faint); flex:none; }
.syncdot.on{ background:var(--brand); box-shadow:0 0 0 3px var(--brand-soft); }
.synclogin{ display:flex; align-items:center; gap:9px; width:100%; text-align:left; background:none; border:none; cursor:pointer; font-family:inherit; font-size:13.5px; color:var(--brand); font-weight:600; padding:10px 8px; }
.authsheet{ text-align:left; }
.authtitle{ font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:20px; color:var(--ink); }
.authhint{ margin-top:8px; font-size:13px; color:var(--ink-soft); line-height:1.45; }
.authinput{ width:100%; height:46px; border:1px solid var(--line); border-radius:12px; padding:0 14px; margin-top:12px; font-family:inherit; font-size:15px; color:var(--ink); background:var(--surface-2); outline:none; }
.authinput:focus{ border-color:var(--brand); }
.autherr{ min-height:18px; margin-top:10px; font-size:13px; color:var(--danger); }
.authbtns{ display:flex; gap:10px; margin-top:8px; }
.authbtn{ flex:1; height:46px; border-radius:12px; border:1px solid var(--line); background:var(--surface); color:var(--ink); font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer; }
.authbtn.primary{ background:var(--brand); color:#fff; border-color:var(--brand); }
.authbtn:active{ transform:scale(.97); }
.fsdetail{ position:absolute; inset:0; z-index:40; background:var(--bg); display:flex; flex-direction:column; animation:tkslide .24s ease; }
@keyframes tkslide{ from{ transform:translateX(6%); opacity:.5; } }
.fshead{ display:flex; align-items:center; justify-content:space-between; padding:max(12px,env(safe-area-inset-top)) 10px 6px; max-width:760px; margin:0 auto; width:100%; }
.fsback{ display:flex; align-items:center; gap:3px; background:none; border:none; color:var(--brand); font-family:inherit; font-size:15.5px; font-weight:600; cursor:pointer; padding:6px; }
.fsback .ic{ width:22px; height:22px; }
.fsback:active{ opacity:.6; }
.fsdel{ background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:8px; display:grid; place-items:center; }
.fsbody{ flex:1; overflow-y:auto; padding:8px 20px max(28px,env(safe-area-inset-bottom)); max-width:760px; margin:0 auto; width:100%; -webkit-overflow-scrolling:touch; }
.fstop{ display:flex; align-items:flex-start; gap:13px; }
.fstop .check{ margin-top:5px; }
.check.big{ width:28px; height:28px; }
.check.big .ic{ width:17px; height:17px; }
.fstitle{ flex:1; border:none; outline:none; resize:none; font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:24px; line-height:1.25; color:var(--ink); background:none; overflow:hidden; }
.fstitle::placeholder{ color:var(--ink-faint); }
.fsbody .note{ resize:none; font-size:15.5px; line-height:1.55; min-height:70px; }
.notelinks{ margin-top:2px; }
.linkshead{ font-size:11.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-faint); margin:16px 0 9px; }
.linkslist{ display:flex; flex-direction:column; gap:9px; }

/* ----------------------------- ikonok ----------------------------- */
const P = {

  globe:'<circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>',
  mail:'<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>',
  phone:'<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>',
  bell:'<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>',
  back:'<path d="m15 18-6-6 6-6"/>',
  ext:'<path d="M7 17 17 7"/><path d="M7 7h10v10"/>'
};
function icon(n, fill){ return '<svg class="ic" width="24" height="24" viewBox="0 0 24 24" fill="'+(fill||'none')+'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+P[n]+'</svg>'; }
const GRIP='<svg class="ic" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg>';

/* ----------------------------- segéd ----------------------------- */
const LIST_COLORS=["#0E7A63","#E0962A","#C0432B","#3B6FB0","#8A5BB8","#2E8B8B","#C9518A"];
const STORE="todo-data-v1";
const uid=()=>Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);
const localISO=d=>{const z=new Date(d.getTime()-d.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);};
const todayISO=()=>localISO(new Date());
const parseISO=s=>{const[a,b,c]=s.split("-").map(Number);return new Date(a,b-1,c);};
function formatDue(iso){
  const t=todayISO(); if(iso===t)return"Ma";
  const diff=Math.round((parseISO(iso)-parseISO(t))/86400000);
  if(diff===1)return"Holnap"; if(diff===-1)return"Tegnap";
  return parseISO(iso).toLocaleDateString("hu-HU",{month:"short",day:"numeric"});
}
const isOverdue=iso=>iso&&iso<todayISO();
const isTodayDue=iso=>iso===todayISO();
function addDaysISO(n){ const d=new Date(); return localISO(new Date(d.getFullYear(),d.getMonth(),d.getDate()+n)); }
function endOfWeekISO(){ const d=new Date(); const wd=(d.getDay()+6)%7; return localISO(new Date(d.getFullYear(),d.getMonth(),d.getDate()+(6-wd))); }
function dueBucket(iso){
  if(!iso) return null;
  const t=todayISO();
  if(iso<t) return "overdue";
  if(iso===t) return "today";
  if(iso===addDaysISO(1)) return "tomorrow";
  if(iso<=endOfWeekISO()) return "week";
  return "later";
}
function timeOptions(sel){
  let o='<option value="">– óra:perc –</option>';
  for(let h=8;h<=20;h++){ for(let m=0;m<60;m+=15){ if(h===20&&m>0) break; const v=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0"); o+='<option value="'+v+'"'+(v===sel?" selected":"")+'>'+v+'</option>'; } }
  return o;
}
function greeting(){const h=new Date().getHours();return h<5?"Még fent vagy?":h<10?"Jó reggelt!":h<18?"Szép napot!":h<22?"Jó estét!":"Szép estét!";}
function esc(s){return(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function defaultData(){
  const l1=uid(),l2=uid();
  return{lists:[{id:l1,name:"Személyes",color:LIST_COLORS[0]},{id:l2,name:"Munka",color:LIST_COLORS[3]}],
    tasks:[
      {id:uid(),listId:l1,title:"Üdv! Koppints a bal oldali karikára, ha kész vagy egy feladattal.",done:false,important:false,note:"",due:"",createdAt:Date.now(),order:0},
      {id:uid(),listId:l1,title:"Jelölj meg valamit fontosként a csillaggal.",done:false,important:false,note:"",due:"",createdAt:Date.now()-1,order:1},
      {id:uid(),listId:l1,title:"Húzd át a feladatokat a jobb oldali fogantyúval, ahogy szeretnéd.",done:false,important:false,note:"",due:"",createdAt:Date.now()-2,order:2},
      {id:uid(),listId:l1,title:"Koppints a feladat szövegére a részletekért és a határidőért.",done:false,important:false,note:"",due:todayISO(),createdAt:Date.now()-3,order:3}
    ]};
}

/* ----------------------------- állapot ----------------------------- */
let data, view={type:"smart",key:"today"}, drawerOpen=false, editLists=false, openTaskId=null, showDone=false, focusAdd=false, focusStep=false;
let searchQuery="", searchSel=-1, suggPicking=false, focusSearch=false;
let plannedFilter="all";
let dragState=null, suppressClick=false;

function ensureOrders(){
  const needs=data.tasks.some(t=>typeof t.order!=="number");
  if(!needs)return;
  const ordered=data.tasks.slice().sort((a,b)=>{
    if(a.important!==b.important)return a.important?-1:1;
    const ad=a.due||"9999",bd=b.due||"9999"; if(ad!==bd)return ad<bd?-1:1;
    return a.createdAt-b.createdAt;
  });
  ordered.forEach((t,i)=>{ t.order=i; });
  save();
}
function applyVisibleOrder(ids){
  const byId=id=>data.tasks.find(t=>t.id===id);
  const slots=ids.map(id=>byId(id).order).sort((a,b)=>a-b);
  ids.forEach((id,i)=>{ byId(id).order=slots[i]; });
}
function applyStepOrder(taskId, ids){
  const t=data.tasks.find(x=>x.id===taskId); if(!t||!t.steps)return;
  t.steps.sort((a,b)=>ids.indexOf(a.id)-ids.indexOf(b.id));
  t.steps.forEach((s,i)=>{ s.order=i; });
}

function load(){
  try{const raw=localStorage.getItem(STORE); if(raw){const d=JSON.parse(raw); if(d&&d.lists&&d.lists.length)return d;}}catch(e){}
  return null;
}
function saveLocal(){ try{ localStorage.setItem(STORE,JSON.stringify(data)); }catch(e){ console.error("Helyi mentés sikertelen",e);} }
function pushToCloud(){
  if(!fbUser||!fbDb) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    const blob=JSON.stringify(data);
    lastSyncedBlob=blob;
    fbDb.collection("appdata").doc(fbUser.uid).set({ blob, ts:Date.now() }).catch(e=>console.error("Felhő mentés hiba",e));
  }, 700);
}
function save(){ saveLocal(); pushToCloud(); }

const listById=id=>data.lists.find(l=>l.id===id);
const activeCount=p=>data.tasks.filter(t=>!t.done&&p(t)).length;

function currentTasks(){
  if(view.type==="smart"){
    if(view.key==="today")return data.tasks.filter(t=>isTodayDue(t.due)||isOverdue(t.due)||(t.done&&t.completedAt&&isTodayDue(localISO(new Date(t.completedAt)))));
    if(view.key==="planned")return data.tasks.filter(t=>t.due);
    if(view.key==="important")return data.tasks.filter(t=>t.important);
    return data.tasks.slice();
  }
  return data.tasks.filter(t=>t.listId===view.key);
}
function hasQuickBar(){
  return true;
}
function sortTasks(a,b){
  if(a.important!==b.important)return a.important?-1:1;
  const ad=a.due||"9999",bd=b.due||"9999"; if(ad!==bd)return ad<bd?-1:1;
  return a.createdAt-b.createdAt;
}

/* ----------------------------- render ----------------------------- */
function render(){
  const counts={
    today:activeCount(t=>isTodayDue(t.due)||isOverdue(t.due)),
    important:activeCount(t=>t.important),
    planned:activeCount(t=>!!t.due),
    all:activeCount(()=>true),
    lists:Object.fromEntries(data.lists.map(l=>[l.id,activeCount(t=>t.listId===l.id)]))
  };
  const scope=currentTasks();
  const barOn=hasQuickBar();
  const tasks=(barOn && plannedFilter!=="all") ? (plannedFilter==="none" ? scope.filter(t=>!t.due) : scope.filter(t=>t.due && dueBucket(t.due)===plannedFilter)) : scope;
  const open=tasks.filter(t=>!t.done).sort((a,b)=>a.order-b.order);
  const done=tasks.filter(t=>t.done).sort((a,b)=>(b.completedAt||0)-(a.completedAt||0));

  // fejléc
  let H;
  if(view.type==="list"){const l=listById(view.key); H={title:esc(l.name),dot:l.color,sub:counts.lists[l.id]===0?"Minden kész":counts.lists[l.id]+" aktív feladat"};}
  else if(view.key==="today") H={title:"Ma",ic:"sun",sub:greeting()+" · "+new Date().toLocaleDateString("hu-HU",{month:"long",day:"numeric",weekday:"long"})};
  else if(view.key==="planned") H={title:"Tervezett",ic:"calendar",sub:counts.planned===0?"Nincs határidős feladat":counts.planned+" határidős feladat"};
  else if(view.key==="important") H={title:"Fontos",ic:"star",sub:counts.important===0?"Minden kész":counts.important+" aktív feladat"};
  else H={title:"Minden feladat",ic:"list",sub:counts.all===0?"Minden kész":counts.all+" aktív feladat"};

  const smart=(key,ic,label,n)=>'<button class="smartitem '+(view.type==="smart"&&view.key===key?"active":"")+'" data-action="view" data-vt="smart" data-vk="'+key+'"><span class="smarticon" style="color:'+(key==="today"?"var(--brand)":key==="important"?"var(--amber)":"var(--ink-soft)")+'">'+icon(ic)+'</span><span class="smartlabel">'+label+'</span>'+(n>0?'<span class="badge">'+n+'</span>':'')+'</button>';

  const listRows=data.lists.map(l=>{
    if(editLists){
      return '<div class="listrow"><input class="listedit" data-rename="'+l.id+'" value="'+esc(l.name)+'">'+(data.lists.length>1?'<button class="deletelist" data-action="dellist" data-id="'+l.id+'">'+icon("trash")+'</button>':'')+'</div>';
    }
    return '<div class="listrow"><button class="listbtn '+(view.type==="list"&&view.key===l.id?"active":"")+'" data-action="view" data-vt="list" data-vk="'+l.id+'"><span class="dot" style="background:'+l.color+'"></span><span class="listname">'+esc(l.name)+'</span>'+(counts.lists[l.id]>0?'<span class="badge">'+counts.lists[l.id]+'</span>':'')+'</button></div>';
  }).join("");

  const taskRow=(t,draggable)=>{
    const overdue=!t.done&&isOverdue(t.due);
    const showList=view.type==="smart";
    const ln=listById(t.listId);
    return '<li class="task '+(t.done?"done-row":"")+'" data-id="'+t.id+'">'
      +'<button class="check '+(t.done?"on":"")+'" data-action="toggle" data-id="'+t.id+'">'+icon("check")+'</button>'
      +'<button class="taskbody" data-action="open" data-id="'+t.id+'"><span class="tasktitle">'+esc(t.title)+'</span>'
      +'<span class="meta">'
      +((showList&&ln)?'<span class="metalist"><span class="dot sm" style="background:'+ln.color+'"></span>'+esc(ln.name)+'</span>':'')
      +(t.due?'<span class="due '+(overdue?"late":isTodayDue(t.due)?"today":"")+'">'+icon("calendar")+formatDue(t.due)+'</span>':'')
      +((t.steps&&t.steps.length)?'<span class="stepchip">'+icon("check")+(t.steps.filter(s=>s.done).length)+'/'+t.steps.length+'</span>':'')
      +(t.note?'<span class="hasnote">'+icon("pencil")+'</span>':'')
      +'</span></button>'
      +'<button class="starbtn '+(t.important?"on":"")+'" data-action="star" data-id="'+t.id+'">'+icon("star",t.important?"var(--amber)":"none")+'</button>'
      +(draggable?'<button class="grip" aria-label="Húzás átrendezéshez">'+GRIP+'</button>':'')
      +'</li>';
  };

  let emptyT="",emptyS="";
  if(barOn && plannedFilter!=="all"){
    if(plannedFilter==="none"){ emptyT="Nincs határidő nélküli feladat"; emptyS="Minden itteni feladatnak van határideje."; }
    else{
      const names={overdue:"késedelmes",today:"mai",tomorrow:"holnapi",week:"e heti",later:"későbbi"};
      emptyT="Nincs "+(names[plannedFilter]||"")+" feladat itt";
      emptyS="Válts a fenti szűrőn, vagy állíts be határidőt egy feladatnál.";
    }
  }
  else if(view.type==="smart"&&view.key==="today"){emptyT="Mára nincs esedékes feladatod";emptyS="Élvezd a nyugalmat, vagy adj hozzá valamit lent.";}
  else if(view.type==="smart"&&view.key==="planned"){
    emptyT="Nincs határidős feladatod";emptyS="Állíts be határidőt egy feladatnál, és itt megjelenik.";
  }
  else if(view.type==="smart"&&view.key==="important"){emptyT="Nincs fontosként megjelölt feladat";emptyS="Koppints a csillagra egy feladatnál, és itt fog megjelenni.";}
  else if(view.type==="smart"){emptyT="Még nincs egyetlen feladat sem";emptyS="Lent tudsz hozzáadni egyet.";}
  else{emptyT="Üres a lista";emptyS="Írd be lent az első feladatot.";}

  let plannedBar="";
  if(barOn){
    const allLabel=(view.type==="smart"&&view.key==="planned")?"Az összes tervezett":"Összes";
    const chips=[["all",allLabel]];
    if(!(view.type==="smart"&&view.key==="planned")) chips.push(["none","Nincs határidő"]);
    chips.push(["overdue","Késedelmes"],["today","Ma"],["tomorrow","Holnap"],["week","E héten"],["later","Később"]);
    plannedBar='<div class="qfilter">'+chips.map(c=>{
      const n=scope.filter(t=>!t.done && (c[0]==="all"?true:c[0]==="none"? !t.due : (t.due&&dueBucket(t.due)===c[0]))).length;
      return '<button class="qchip'+(plannedFilter===c[0]?" active":"")+'" data-action="qfilter" data-key="'+c[0]+'">'+icon("calendar")+'<span>'+c[1]+'</span>'+(n>0?'<span class="qcount">'+n+'</span>':'')+'</button>';
    }).join("")+'</div>';
  }

  const detail=openTaskId?data.tasks.find(t=>t.id===openTaskId):null;

  let stepsHTML="";
  if(detail){

/* ----------------------------- műveletek ----------------------------- */
function addTask(val){
  const title=(val||"").trim(); if(!title)return;
  let listId,important=false,due="";
  if(view.type==="list")listId=view.key;
  else{ listId=data.lists[0].id; if(view.key==="today")due=todayISO(); if(view.key==="important")important=true; }
  const minOrder=data.tasks.length?Math.min(...data.tasks.map(t=>typeof t.order==="number"?t.order:0)):0;
  data.tasks.push({id:uid(),listId,title,done:false,important,note:"",due,createdAt:Date.now(),order:minOrder-1});
  save(); focusAdd=true; render();
}
function addStep(taskId, text){
  text=(text||"").trim(); if(!text)return;
  const t=data.tasks.find(x=>x.id===taskId); if(!t)return;
  if(!t.steps)t.steps=[];
  const maxO=t.steps.length?Math.max(...t.steps.map(s=>s.order)):-1;
  t.steps.push({id:uid(),text,done:false,order:maxO+1});
  save(); focusStep=true; render();
}
function addList(val){
  const name=(val||"").trim(); if(!name)return;
  const id=uid();
  data.lists.push({id,name,color:LIST_COLORS[data.lists.length%LIST_COLORS.length]});
  save(); view={type:"list",key:id}; drawerOpen=false; render();
}
function delList(id){
  if(data.lists.length<=1)return;
  data.lists=data.lists.filter(l=>l.id!==id); data.tasks=data.tasks.filter(t=>t.listId!==id);
  if(view.type==="list"&&view.key===id)view={type:"smart",key:"today"};
  save(); render();
}

/* ----------------------------- események ----------------------------- */
document.getElementById("app").addEventListener("click",e=>{
  if(suppressClick)return;
  const el=e.target.closest("[data-action]"); if(!el)return;
  const a=el.dataset.action, id=el.dataset.id;
  if(a==="opendrawer"){drawerOpen=true;render();}
  else if(a==="closedrawer"){drawerOpen=false;render();}
  else if(a==="editlists"){editLists=!editLists;render();}
  else if(a==="view"){view={type:el.dataset.vt,key:el.dataset.vk};plannedFilter="all";drawerOpen=false;render();}
  else if(a==="toggle"){const t=data.tasks.find(x=>x.id===id);t.done=!t.done;t.completedAt=t.done?Date.now():null;save();render();}
  else if(a==="star"){const t=data.tasks.find(x=>x.id===id);t.important=!t.important;save();render();}
  else if(a==="open"){openTaskId=id;render();}
  else if(a==="closesheet"){openTaskId=null;render();}
  else if(a==="add"){const ai=document.getElementById("addinput");addTask(ai?ai.value:"");}
  else if(a==="dellist"){delList(id);}
  else if(a==="deltask"){data.tasks=data.tasks.filter(x=>x.id!==id);openTaskId=null;save();render();}
  else if(a==="duetoday"){const t=data.tasks.find(x=>x.id===id);t.due=todayISO();save();render();}
  else if(a==="duetomorrow"){const t=data.tasks.find(x=>x.id===id);t.due=localISO(new Date(Date.now()+86400000));save();render();}
  else if(a==="dueclear"){const t=data.tasks.find(x=>x.id===id);t.due="";save();render();}
  else if(a==="remindclear"){const t=data.tasks.find(x=>x.id===id);t.reminder="";t.reminderFired=false;save();render();}
  else if(a==="toggledone"){showDone=!showDone;render();}
  else if(a==="qfilter"){ plannedFilter=el.dataset.key; render(); }
  else if(a==="addstep"){ const si=document.getElementById("stepinput"); addStep(id, si?si.value:""); }
  else if(a==="stepdone"){ const t=data.tasks.find(x=>x.id===openTaskId); if(t&&t.steps){ const s=t.steps.find(x=>x.id===el.dataset.sid); if(s){ s.done=!s.done; save(); render(); } } }
  else if(a==="stepdel"){ const t=data.tasks.find(x=>x.id===openTaskId); if(t&&t.steps){ t.steps=t.steps.filter(x=>x.id!==el.dataset.sid); save(); render(); } }
  else if(a==="reset"){ if(confirm("Biztosan törölsz minden listát és feladatot? Ez nem vonható vissza.")){ data=defaultData(); view={type:"list",key:data.lists[0].id}; drawerOpen=false; save(); render(); } }
  else if(a==="openauth"){ authOpen=true; openTaskId=null; drawerOpen=false; authError=""; render(); }
  else if(a==="closeauth"){ authOpen=false; render(); }
  else if(a==="authlogin"){ doAuth("login"); }
  else if(a==="authsignup"){ doAuth("signup"); }
  else if(a==="signout"){ signOut(); }
});

/* ----------------------------- kereső (autocomplete) ----------------------------- */
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function highlight(text, rawQ){
  if(!rawQ) return esc(text);
  const idx=text.toLowerCase().indexOf(rawQ.toLowerCase());
  if(idx<0) return esc(text);
  return esc(text.slice(0,idx))+'<b>'+esc(text.slice(idx,idx+rawQ.length))+'</b>'+esc(text.slice(idx+rawQ.length));
}
function attachSearch(){
  const si=document.getElementById("searchinput");
  const drop=document.getElementById("searchdrop");
  const clr=document.querySelector(".searchclear");
  if(!si)return;
  si.addEventListener("input",()=>{ searchQuery=si.value; updateSearch(); });
  si.addEventListener("keydown",onSearchKey);
  si.addEventListener("blur",()=>{ setTimeout(()=>{ if(!suggPicking&&drop){ drop.classList.remove("show"); } }, 160); });
  if(drop) drop.addEventListener("pointerdown",()=>{ suggPicking=true; });
  if(drop) drop.addEventListener("click",e=>{ const s=e.target.closest(".sugg"); if(s&&s.dataset.id){ openSuggestion(s.dataset.id); } suggPicking=false; });
  if(clr) clr.addEventListener("click",()=>{ si.value=""; searchQuery=""; updateSearch(); si.focus(); });
  if(focusSearch){ si.focus(); focusSearch=false; }
}
function matchTask(t,q){
  if(norm(t.title).includes(q)) return "title";
  if(t.note && norm(t.note).includes(q)) return "note";
  if(t.steps && t.steps.some(s=>norm(s.text).includes(q))) return "step";
  return null;
}
function updateSearch(){
  const si=document.getElementById("searchinput");
  const drop=document.getElementById("searchdrop");
  const clr=document.querySelector(".searchclear");
  if(!si||!drop)return;
  const raw=si.value.trim(), q=norm(raw);
  if(clr) clr.classList.toggle("show", si.value.length>0);
  searchSel=-1;
  if(!q){ drop.classList.remove("show"); drop.innerHTML=""; return; }
  const matches=[];
  for(const t of data.tasks){ const via=matchTask(t,q); if(via){ matches.push({t,via}); if(matches.length>=12)break; } }
  if(!matches.length){ drop.innerHTML='<div class="suggempty">Nincs találat</div>'; drop.classList.add("show"); return; }
  drop.innerHTML=matches.map((m,i)=>{
    const t=m.t, ln=listById(t.listId);
    let sub="";
    if(m.via==="step"){ const s=t.steps.find(s=>norm(s.text).includes(q)); if(s) sub="↳ lépés: "+esc(s.text); }
    else if(m.via==="note"){ sub="↳ a jegyzetben"; }
    const meta=esc(ln?ln.name:"")+(t.due?" · "+formatDue(t.due):"")+((t.steps&&t.steps.length)?" · "+t.steps.filter(s=>s.done).length+"/"+t.steps.length:"");
    return '<div class="sugg" data-id="'+t.id+'">'
      +'<span class="dot" style="background:'+(ln?ln.color:"var(--ink-faint)")+'"></span>'
      +'<div class="suggmain"><div class="suggtitle'+(t.done?" sdone":"")+'">'+highlight(t.title,raw)+'</div>'
      +'<div class="suggmeta">'+meta+'</div>'
      +(sub?'<div class="suggsub">'+sub+'</div>':'')
      +'</div></div>';
  }).join("");
  drop.classList.add("show");
}
function onSearchKey(e){
  const drop=document.getElementById("searchdrop");
  const items=drop?Array.from(drop.querySelectorAll(".sugg")):[];
  if(e.key==="ArrowDown"){ e.preventDefault(); if(!items.length)return; searchSel=(searchSel+1)%items.length; paintSel(items); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(!items.length)return; searchSel=(searchSel-1+items.length)%items.length; paintSel(items); }
  else if(e.key==="Enter"){ e.preventDefault(); const pick=searchSel>=0?items[searchSel]:items[0]; if(pick&&pick.dataset.id) openSuggestion(pick.dataset.id); }
  else if(e.key==="Escape"){ const si=document.getElementById("searchinput"); si.value=""; searchQuery=""; updateSearch(); si.blur(); }
}
function paintSel(items){ items.forEach((el,i)=>el.classList.toggle("active",i===searchSel)); if(items[searchSel]) items[searchSel].scrollIntoView({block:"nearest"}); }
function openSuggestion(id){
  const t=data.tasks.find(x=>x.id===id); if(!t)return;
  searchQuery=""; suggPicking=false;
  view={type:"list",key:t.listId};
  openTaskId=id;
  render();
}

/* ----------------------------- húzásos átrendezés ----------------------------- */
function setupDrag(){
  document.querySelectorAll(".task .grip").forEach(h=>{ h.addEventListener("pointerdown",e=>beginDrag(e,".task",ids=>{ applyVisibleOrder(ids); save(); })); });
  document.querySelectorAll(".step .stepgrip").forEach(h=>{ h.addEventListener("pointerdown",e=>beginDrag(e,".step",ids=>{ applyStepOrder(openTaskId,ids); save(); })); });
}
function beginDrag(e, rowSel, onReorder){
  if(!e.isPrimary)return;
  e.preventDefault();
  const li=e.target.closest(rowSel);
  const ul=li.parentNode;
  const items=Array.from(ul.children).filter(c=>c.matches(rowSel)).map(el=>{ const r=el.getBoundingClientRect(); return {el,id:el.dataset.id,center:r.top+r.height/2}; });
  const index=items.findIndex(it=>it.el===li);
  dragState={ li, items, index, target:index, startY:e.clientY, height:li.getBoundingClientRect().height, moved:false, pid:e.pointerId, onReorder };
  try{ li.setPointerCapture(e.pointerId); }catch(_){}
  li.addEventListener("pointermove",onGripMove);
  li.addEventListener("pointerup",onGripUp);
  li.addEventListener("pointercancel",onGripUp);
}
function onGripMove(e){
  const d=dragState; if(!d)return;
  e.preventDefault();
  const dy=e.clientY-d.startY;
  if(Math.abs(dy)>4)d.moved=true;
  d.li.classList.add("lift");
  d.li.style.transform="translateY("+dy+"px)";
  const center=d.items[d.index].center+dy;
  let target=d.index;
  while(target>0 && center<d.items[target-1].center) target--;
  while(target<d.items.length-1 && center>d.items[target+1].center) target++;
  d.target=target;
  d.items.forEach((it,i)=>{
    if(it.el===d.li)return;
    let shift=0;
    if(d.index<target && i>d.index && i<=target) shift=-d.height;
    else if(d.index>target && i>=target && i<d.index) shift=d.height;
    it.el.style.transition="transform .16s ease";
    it.el.style.transform=shift?"translateY("+shift+"px)":"";
  });
}
function onGripUp(){
  const d=dragState; if(!d)return;
  d.li.removeEventListener("pointermove",onGripMove);
  d.li.removeEventListener("pointerup",onGripUp);
  d.li.removeEventListener("pointercancel",onGripUp);
  d.items.forEach(it=>{ it.el.style.transition=""; it.el.style.transform=""; });
  d.li.classList.remove("lift");
  if(d.moved && d.target!==d.index){
    const ids=d.items.map(it=>it.id);
    const[m]=ids.splice(d.index,1);
    ids.splice(d.target,0,m);
    d.onReorder(ids);
    suppressClick=true; setTimeout(()=>{ suppressClick=false; },60);
  }
  dragState=null;
  render();
}

/* ----------------------------- leírás: linkek felismerése ----------------------------- */
function normPhone(raw){
  if(!raw) return null;
  let s=raw.replace(/[^\d+]/g,"");
  if(s.indexOf("+")>0) s=s.replace(/\+/g,"");
  if(s.startsWith("00")) s="+"+s.slice(2);
  if(s.startsWith("+")){
    const dg=s.slice(1).replace(/\D/g,"");
    return (dg.length>=8&&dg.length<=15)?("+"+dg):null;
  }
  let n=s.replace(/\D/g,"");
  if(n.startsWith("06")) n="36"+n.slice(2);
  else if(n.startsWith("36")){}
  else if(/^(1|20|21|30|31|50|70)/.test(n)&&n.length===9) n="36"+n;
  else return null;
  return (n.length>=10&&n.length<=12)?("+"+n):null;
}
function webKey(href){ return "web|"+href.replace(/^https?:\/\//i,"").replace(/^www\./i,"").replace(/\/+$/,"").toLowerCase(); }
function extractLinks(text){
  if(!text) return [];
  const map=new Map();
  const putWeb=(label,href)=>{
    if(!/^https?:\/\//i.test(href)) href="https://"+href.replace(/^\/+/,"");
    const k=webKey(href), ex=map.get(k);
    if(!ex){ map.set(k,{type:"web",label:label||href.replace(/^https?:\/\//i,""),href}); }
    else{ if(/^https:/i.test(href)&&/^http:/i.test(ex.href)) ex.href=href; }
  };
  const putEmail=(em)=>{ const k="email|"+em.toLowerCase(); if(!map.has(k)) map.set(k,{type:"email",label:em,href:"mailto:"+em}); };
  const putPhone=(raw)=>{ const p=normPhone(raw); if(!p) return; const k="phone|"+p; if(!map.has(k)) map.set(k,{type:"phone",label:p,href:"tel:"+p}); };
  const classify=(label,target)=>{
    let t=(target||"").trim();
    if(/^mailto:/i.test(t)) return putEmail(t.replace(/^mailto:/i,""));
    if(/^tel:/i.test(t)) return putPhone(t.replace(/^tel:/i,""));
    if(/^[\w.+-]+@[\w-]+\.[\w.-]+$/.test(t)) return putEmail(t);
    if(/^https?:\/\//i.test(t)) return putWeb(label,t);
    if(/^www\./i.test(t)) return putWeb(label,t);
    const ph=normPhone(t); if(ph&&/[\d]/.test(t)&&/^[\d+\s\-\/().]+$/.test(t)) return putPhone(t);
    if(/^[\w-]+(\.[\w-]+)+(\/.*)?$/.test(t)) return putWeb(label,t);
  };
  let work=text;
  work=work.replace(/\[([^\]]*)\]\(([^)]+)\)/g,(m,l,tg)=>{ classify(l.trim()||tg.trim(),tg.trim()); return " "; });
  work=work.replace(/<([^>\s]+)>/g,(m,tg)=>{ classify(tg.trim(),tg.trim()); return " "; });
  work=work.replace(/[\w.+-]+@[\w-]+\.[\w.-]+/g,(m)=>{ putEmail(m); return " "; });
  work=work.replace(/(?:https?:\/\/|www\.)[^\s<>()]+/gi,(m)=>{ classify(m,m); return " "; });
  work.replace(/\+?\d[\d\s\-\/().]{7,}\d/g,(m)=>{ putPhone(m); return m; });
  return Array.from(map.values());
}
function linksHTML(text){
  const links=extractLinks(text);
  if(!links.length) return "";
  const ic={web:"globe",email:"mail",phone:"phone"};
  const rows=links.map(l=>{
    const attrs = l.type==="web" ? ' target="_blank" rel="noopener noreferrer"' : "";
    return '<a class="linkrow '+l.type+'" href="'+esc(l.href)+'"'+attrs+'>'
      +'<span class="linkicon">'+icon(ic[l.type])+'</span>'
      +'<span class="linktext">'+esc(l.label)+'</span>'
      +'<span class="linkgo">'+icon("ext")+'</span></a>';
  }).join("");
  return '<div class="linkshead">Felismert kapcsolatok</div><div class="linkslist">'+rows+'</div>';
}
function growNote(el){
  if(!el) return;
  el.style.height="auto";
  const max=Math.round(window.innerHeight*0.42);
  const h=Math.min(el.scrollHeight, max);
  el.style.height=h+"px";
  el.style.overflowY = el.scrollHeight>max+1 ? "auto" : "hidden";
}

/* ----------------------------- Firebase szinkron ----------------------------- */
function initFirebase(){
  if(!SYNC_ENABLED || typeof firebase==="undefined") return;
  try{
    firebase.initializeApp(firebaseConfig);
    fbAuth=firebase.auth();
    fbDb=firebase.firestore();
    fbAuth.onAuthStateChanged(onAuthChange);
  }catch(e){ console.error("Firebase init hiba",e); }
}
function onAuthChange(user){
  fbUser=user;
  if(fbUnsub){ fbUnsub(); fbUnsub=null; }
  if(user && fbDb){
    const ref=fbDb.collection("appdata").doc(user.uid);
    fbUnsub=ref.onSnapshot(snap=>{
      const d=snap.data();
      if(!snap.exists || !d || !d.blob){ pushToCloud(); return; }
      if(d.blob===lastSyncedBlob) return;
      try{
        const remote=JSON.parse(d.blob);
        if(remote && remote.lists){
          data=remote; lastSyncedBlob=d.blob;
          ensureOrders(); saveLocal(); render();
        }
      }catch(e){ console.error("Felhő adat hiba",e); }
    }, err=>console.error("Szinkron hiba",err));
  }
  render();
}
function doAuth(kind){
  const emEl=document.getElementById("authemail"), pwEl=document.getElementById("authpass");
  const em=(emEl?emEl.value:"").trim(), pw=pwEl?pwEl.value:"";
  if(!em||!pw){ authError="Add meg az e-mailt és a jelszót."; renderAuthErr(); return; }
  authError="Folyamatban…"; renderAuthErr();
  const p = kind==="signup" ? fbAuth.createUserWithEmailAndPassword(em,pw) : fbAuth.signInWithEmailAndPassword(em,pw);
  p.then(()=>{ authOpen=false; authError=""; render(); })
   .catch(e=>{ authError=authMsg(e); renderAuthErr(); });
}
function authMsg(e){
  const c=(e&&e.code)||"";
  if(c==="auth/invalid-email") return "Érvénytelen e-mail-cím.";
  if(c==="auth/weak-password") return "A jelszó legalább 6 karakter legyen.";
  if(c==="auth/email-already-in-use") return "Ez az e-mail már regisztrálva van — inkább jelentkezz be.";
  if(c==="auth/invalid-credential"||c==="auth/wrong-password"||c==="auth/user-not-found") return "Hibás e-mail vagy jelszó.";
  if(c==="auth/network-request-failed") return "Nincs internetkapcsolat.";
  return (e&&e.message)||"Ismeretlen hiba.";
}
function renderAuthErr(){ const el=document.getElementById("autherr"); if(el) el.textContent=authError; }
function signOut(){ if(fbAuth) fbAuth.signOut().catch(e=>console.error(e)); }

/* ----------------------------- emlékeztetők ----------------------------- */
function requestNotify(){
  try{ if("Notification" in window && Notification.permission==="default") Notification.requestPermission(); }catch(e){}
}
function fireReminder(t){
  try{
    if("Notification" in window && Notification.permission==="granted"){
      new Notification("Emlékeztető", { body: t.title, tag: t.id });
      return;
    }
  }catch(e){}
  showToast("⏰ "+t.title);
}
function checkReminders(){
  if(!data||!data.tasks) return;
  const now=new Date();
  let changed=false;
  data.tasks.forEach(t=>{
    if(t.reminder && !t.done && !t.reminderFired){
      if(new Date(t.reminder) <= now){ fireReminder(t); t.reminderFired=true; changed=true; }
    }
  });
  if(changed) save();
}
function showToast(msg){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; el.className="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add("show");
  clearTimeout(showToast._t); showToast._t=setTimeout(()=>el.classList.remove("show"), 6000);
}
function storageWorks(){
  try{ const k="__stest__"; localStorage.setItem(k,"1"); const ok=localStorage.getItem(k)==="1"; localStorage.removeItem(k); return ok; }catch(e){ return false; }
}
function warnNoStorage(){
  if(storageWorks()) return;
  let b=document.getElementById("storagewarn");
  if(!b){ b=document.createElement("div"); b.id="storagewarn"; b.className="storagewarn"; document.body.appendChild(b); }
  b.innerHTML='⚠️ A böngésző nem engedi a helyi mentést, ezért a feladatok nem maradnak meg.<br>iPhone: <b>Beállítások → Safari → „Minden süti letiltása"</b> legyen <b>kikapcsolva</b>, majd töltsd újra az oldalt.';
}

data=load();
if(!data){ data=defaultData(); view={type:"list",key:data.lists[0].id}; save(); }
ensureOrders();
render();
warnNoStorage();
initFirebase();
checkReminders();
setInterval(checkReminders, 30000);
