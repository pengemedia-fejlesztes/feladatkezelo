*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
:root{
  --bg:#F0F4F9; --surface:#FFFFFF; --surface-2:#F0F4F9;
  --ink:#1E2A38; --ink-soft:#5D6B7A; --ink-faint:#97A3AF;
  --brand:#2E6FB0; --brand-soft:#E3EDF7; --amber:#C77A16; --amber-soft:#FBEFD8;
  --teal:#2C8C8C; --teal-soft:#E0F0EE;
  --danger:#C0392B; --danger-soft:#F6E3DE; --line:#E1E8F0; --hair:#EEF2F7; --chk:#BCC6D1;
  --shadow:0 1px 2px rgba(30,42,56,.05);
}
body.dark{
  --bg:#0F1621; --surface:#1B2634; --surface-2:#141D28;
  --ink:#E8EEF5; --ink-soft:#A6B3C1; --ink-faint:#6F7D8C;
  --brand:#5AA2E6; --brand-soft:#21344A;
  --amber:#E0A54A; --amber-soft:#3A2E18;
  --teal:#4FB3B3; --teal-soft:#16302F;
  --danger:#E86A5C; --danger-soft:#3A211E; --line:#2A3745; --hair:#222E3A; --chk:#46586A;
  --shadow:0 1px 2px rgba(0,0,0,.4);
}
.themetoggle{ display:flex; align-items:center; gap:8px; width:100%; background:none; border:none; color:var(--ink-soft); font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; padding:8px 6px; }
.themetoggle .ic{ width:15px; height:15px; }
.themetoggle:active{ transform:scale(.97); }
html,body{ height:100%; }
body{
  font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
  background:var(--bg); color:var(--ink);
  height:100dvh; overflow:hidden; -webkit-font-smoothing:antialiased;
}
.ic{ display:block; }
#app{ display:flex; height:100dvh; position:relative; }

/* fő terület */
.main{ flex:1; display:flex; flex-direction:column; min-width:0; max-width:760px; margin:0 auto; width:100%; }
.header{ display:flex; align-items:flex-start; gap:12px; padding:max(18px,env(safe-area-inset-top)) 18px 10px; }
.menu{ flex:none; width:42px; height:42px; border:none; background:var(--surface); border-radius:13px; color:var(--ink);
  display:grid; place-items:center; box-shadow:var(--shadow); cursor:pointer; transition:transform .12s; }
.menu:active{ transform:scale(.93); }
.titlewrap{ padding-top:2px; min-width:0; }
.title{ font-family:'Hanken Grotesk',sans-serif; font-weight:800; font-size:29px; line-height:1.05;
  letter-spacing:-.02em; color:var(--ink); display:flex; align-items:center; gap:10px; }
.titleicon{ display:inline-flex; color:var(--brand); }
.titledot{ width:13px; height:13px; border-radius:50%; }
.sub{ margin-top:5px; color:var(--ink-soft); font-size:14px; font-weight:500; }

.scroll{ flex:1; overflow-y:auto; padding:6px 12px 12px; -webkit-overflow-scrolling:touch; }
.tasklist{ list-style:none; background:var(--surface); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); margin-bottom:12px; }

.task{ -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; display:flex; align-items:center; gap:12px;
  padding:14px 14px 14px 15px; border-bottom:1px solid var(--hair); position:relative; }
.task::before{ content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--strip,transparent); }
.task:last-child{ border-bottom:none; }
@keyframes tkin{ from{ opacity:0; transform:translateY(6px);} }
.task.done-row{ background:var(--surface-2); }
@keyframes tkdrop{ 0%{ opacity:0; transform:translateY(-16px) scale(.98); } 100%{ opacity:1; transform:none; } }
.task.justdone{ animation:tkdrop .34s cubic-bezier(.22,.61,.36,1); }
.check{ flex:none; width:25px; height:25px; border-radius:8px; border:2px solid var(--chk);
  background:transparent; cursor:pointer; display:grid; place-items:center; color:#fff; transition:.18s; }
.check .ic{ opacity:0; transform:scale(.4); transition:.18s; stroke-width:3.2; }
.check.on{ background:var(--brand); border-color:var(--brand); animation:tkpop .28s ease; }
.check.on .ic{ opacity:1; transform:scale(1); }
@keyframes tkpop{ 0%{ transform:scale(1);} 45%{ transform:scale(1.22);} 100%{ transform:scale(1);} }
.taskbody{ flex:1; min-width:0; text-align:left; background:none; border:none; cursor:pointer; padding:2px 0; }
.tasktitle{ display:block; font-size:17px; font-weight:600; line-height:1.3; color:var(--ink); word-break:break-word; }
.done-row .tasktitle{ color:var(--ink-faint); text-decoration:line-through; font-weight:500; }
.meta{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-top:5px; }
.metalist{ display:inline-flex; align-items:center; gap:5px; font-size:13px; color:var(--ink-soft); font-weight:500; }
.dot{ width:9px; height:9px; border-radius:50%; flex:none; }
.dot.sm{ width:7px; height:7px; }
.due{ display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:700; color:var(--ink-soft);
  background:var(--hair); padding:2px 8px; border-radius:20px; }
.due .ic{ width:12px; height:12px; }
.due.today{ color:var(--brand); background:var(--brand-soft); }
.due.late{ color:var(--danger); background:var(--danger-soft); }
.hasnote{ color:var(--ink-faint); display:inline-flex; }
.hasnote .ic{ width:11px; height:11px; }
.starbtn{ flex:none; background:none; border:none; cursor:pointer; color:var(--ink-faint); padding:5px;
  display:grid; place-items:center; transition:transform .12s, color .15s; }
.starbtn:active{ transform:scale(.85); }
.starbtn.on{ color:var(--amber); }

.donewrap{ margin-top:18px; }
.donehead{ display:flex; align-items:center; gap:6px; background:none; border:none; cursor:pointer;
  color:var(--ink-soft); font-size:13px; font-weight:600; padding:6px 4px; }
.donehead .ic{ transition:transform .2s; transform:rotate(-90deg); width:16px; height:16px; }
.donehead.open .ic{ transform:rotate(0deg); }

.empty{ text-align:center; padding:54px 24px; color:var(--ink-soft); }
.emptyicon{ width:62px; height:62px; border-radius:20px; background:var(--surface); box-shadow:var(--shadow);
  display:grid; place-items:center; margin:0 auto 16px; color:var(--brand); }
.emptytitle{ font-family:'Hanken Grotesk',sans-serif; font-weight:600; font-size:17px; color:var(--ink); }
.emptysub{ margin-top:6px; font-size:13.5px; max-width:280px; margin-inline:auto; line-height:1.45; }

.addbar{ display:flex; align-items:center; gap:10px; padding:10px 16px 10px;
  background:linear-gradient(transparent, var(--bg) 28%); }
.addbtn{ flex:none; width:48px; height:48px; border-radius:16px; border:none; background:var(--brand); color:#fff;
  display:grid; place-items:center; cursor:pointer; box-shadow:0 6px 16px rgba(14,122,99,.32); transition:transform .12s; }
.addbtn:active{ transform:scale(.92); }
.addinput{ flex:1; height:48px; border-radius:16px; border:1px solid var(--line); background:var(--surface);
  padding:0 16px; font-size:15.5px; font-family:inherit; color:var(--ink); box-shadow:var(--shadow); outline:none; }
.addinput:focus{ border-color:var(--brand); }
.addinput::placeholder{ color:var(--ink-faint); }
.header.nomenu{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.titlewrap{ min-width:0; }
.hdrbtn{ flex:none; width:44px; height:44px; border-radius:14px; border:1px solid var(--line); background:var(--surface); color:var(--brand); display:grid; place-items:center; cursor:pointer; box-shadow:var(--shadow); }
.hdrbtn.on{ background:var(--brand-soft); border-color:var(--brand-soft); }
.hdrbtn .ic{ width:20px; height:20px; }
.hdrbtn:active{ transform:scale(.94); }
.hdrbtns{ display:flex; gap:8px; flex:none; }
.ndcard{ display:flex; align-items:center; gap:11px; background:var(--brand-soft); border-radius:14px; padding:12px 14px; margin-bottom:12px; }
.ndicon{ flex:none; width:34px; height:34px; border-radius:10px; background:var(--surface); display:grid; place-items:center; color:var(--brand); }
.ndicon .ic{ width:18px; height:18px; }
.ndtext{ font-size:14px; color:var(--ink); line-height:1.4; }
.ndtext b{ color:var(--brand); font-weight:700; }
.ndtom{ color:var(--ink-soft); }
.ndtom b{ color:var(--ink-soft); }
.tabbar{ display:flex; align-items:stretch; background:var(--surface); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -2px 12px rgba(18,40,45,.05); }
.tab{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:7px 2px 7px; background:none; border:none; cursor:pointer; font-family:inherit; font-size:11px; font-weight:600; color:var(--ink-faint); }
.tabic{ display:grid; place-items:center; width:46px; height:30px; border-radius:14px; transition:background .15s; }
.tab .ic{ width:23px; height:23px; }
.tab span:last-child{ line-height:1; }
.tab.on{ color:var(--brand); font-weight:700; }
.tab.on .tabic{ background:var(--brand-soft); }
.tab:active{ opacity:.6; }
.tlgroup{ margin-bottom:18px; }
.tlhead{ display:flex; align-items:center; gap:10px; padding:2px 4px 10px; }
.tllabel{ font-family:'Hanken Grotesk',sans-serif; font-weight:800; font-size:12.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); }
.tlrule{ flex:1; height:1px; background:var(--line); }
.tlcount{ font-size:12px; font-weight:700; color:var(--ink-faint); background:var(--hair); border-radius:20px; padding:1px 9px; }
.tlhead.today .tllabel{ color:var(--brand); } .tlhead.today .tlrule{ background:#D9E3EF; } .tlhead.today .tlcount{ color:var(--brand); background:var(--brand-soft); }
.tlhead.late .tllabel{ color:var(--danger); } .tlhead.late .tlrule{ background:#EAD9D5; } .tlhead.late .tlcount{ color:var(--danger); background:var(--danger-soft); }
.tlhead{ cursor:pointer; }
.tlhead .tlchev{ display:inline-flex; color:var(--ink-faint); transition:transform .2s; }
.tlhead .tlchev .ic{ width:16px; height:16px; }
.tlhead.coll .tlchev{ transform:rotate(-90deg); }

.scrim{ position:absolute; inset:0; background:rgba(20,28,24,.34); opacity:0; pointer-events:none;
  transition:opacity .25s; z-index:20; -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); }
.scrim.on{ opacity:1; pointer-events:auto; }
.drawer{ position:absolute; top:0; left:0; bottom:0; width:84%; max-width:320px; background:var(--surface-2);
  z-index:30; transform:translateX(-102%); transition:transform .28s cubic-bezier(.22,.61,.36,1);
  display:flex; flex-direction:column; padding:max(16px,env(safe-area-inset-top)) 14px 14px; box-shadow:6px 0 28px rgba(20,30,25,.14); }
.drawer.on{ transform:translateX(0); }
.brand{ display:flex; align-items:center; justify-content:space-between; padding:4px 6px 14px; }
.logo{ font-family:'Hanken Grotesk',sans-serif; font-weight:700; font-size:22px; letter-spacing:-.02em; }
.iconbtn{ background:none; border:none; color:var(--ink-soft); cursor:pointer; padding:6px; display:grid; place-items:center; }
.smart{ display:flex; flex-direction:column; gap:3px; }
.smartitem{ display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:12px; border:none;
  background:none; cursor:pointer; font-family:inherit; font-size:14.5px; font-weight:500; color:var(--ink); text-align:left; }
.smarticon{ display:inline-flex; }
.smartlabel{ flex:1; }
.smartitem.active{ background:var(--surface); box-shadow:var(--shadow); }
.divider{ height:1px; background:var(--line); margin:14px 8px; }
.listhead{ display:flex; align-items:center; justify-content:space-between; padding:2px 12px 8px; }
.listhead .lbl{ font-size:11.5px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-faint); }
.edittoggle{ background:none; border:none; color:var(--brand); font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; }
.lists{ display:flex; flex-direction:column; gap:2px; overflow-y:auto; flex:1; }
.listrow{ display:flex; align-items:center; gap:4px; }
.listbtn{ flex:1; display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:11px; border:none;
  background:none; cursor:pointer; font-family:inherit; font-size:14.5px; color:var(--ink); text-align:left; }
.listbtn.active{ background:var(--surface); box-shadow:var(--shadow); }
.listname{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.badge{ font-size:11.5px; font-weight:600; color:var(--ink-soft); background:var(--line); border-radius:20px; padding:1px 8px; min-width:22px; text-align:center; }
.smartitem.active .badge, .listbtn.active .badge{ background:var(--bg); }
.listedit{ flex:1; border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-family:inherit; font-size:14px; background:var(--surface); color:var(--ink); outline:none; }
.deletelist{ flex:none; background:none; border:none; color:var(--danger); cursor:pointer; padding:8px; display:grid; place-items:center; }
.newlist{ display:flex; align-items:center; gap:8px; margin-top:8px; padding:10px 12px; border:1.5px dashed var(--line); border-radius:12px; color:var(--ink-faint); }
.newlist input{ flex:1; border:none; background:none; font-family:inherit; font-size:14px; color:var(--ink); outline:none; }
.drawerfoot{ padding-top:12px; }
.reset{ display:flex; align-items:center; gap:7px; background:none; border:none; color:var(--ink-faint); font-size:12.5px; cursor:pointer; font-family:inherit; padding:6px; }
.reset .ic{ width:15px; height:15px; }

.sheet{ position:absolute; left:0; right:0; bottom:0; z-index:30; background:var(--surface);
  border-radius:22px 22px 0 0; padding:10px 20px max(22px,env(safe-area-inset-bottom)); box-shadow:0 -12px 34px rgba(20,30,25,.16);
  animation:tkup .3s cubic-bezier(.22,.61,.36,1); max-width:760px; margin:0 auto; max-height:88dvh; overflow-y:auto; }
@keyframes tkup{ from{ transform:translateY(100%);} }
.grip{ width:38px; height:4px; border-radius:4px; background:var(--line); margin:2px auto 16px; }
.sheettop{ display:flex; align-items:flex-start; gap:12px; }
.detailtitle{ flex:1; border:none; outline:none; resize:none; font-family:'Hanken Grotesk',sans-serif;
  font-weight:600; font-size:19px; line-height:1.3; color:var(--ink); background:none; }
.field{ margin-top:22px; }
.fieldlabel{ display:flex; align-items:center; gap:7px; font-family:'Hanken Grotesk',sans-serif; font-size:13px; font-weight:800; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-bottom:9px; }
.fieldlabel .ic{ width:16px; height:16px; }
.duerow{ display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
.dateinput{ border:1px solid var(--line); border-radius:11px; padding:9px 12px; font-family:inherit; font-size:14.5px; color:var(--ink); background:var(--surface-2); outline:none; }
.dateinput:focus{ border-color:var(--brand); }
.chip{ border:1px solid var(--line); background:var(--surface-2); border-radius:20px; padding:8px 14px; font-family:inherit; font-size:13.5px; font-weight:500; color:var(--ink); cursor:pointer; }
.chip:active{ background:var(--brand-soft); border-color:var(--brand); }
.chip.ghost{ color:var(--danger); border-color:transparent; background:none; }
.note{ width:100%; min-height:88px; border:1px solid var(--line); border-radius:13px; padding:12px 14px;
  font-family:inherit; font-size:14.5px; line-height:1.5; color:var(--ink); background:var(--surface-2); outline:none; resize:vertical; }
.note:focus{ border-color:var(--brand); }
.note::placeholder{ color:var(--ink-faint); }
.sheetfoot{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:26px; }
.delete{ display:flex; align-items:center; gap:7px; background:none; border:none; color:var(--danger); font-family:inherit; font-size:14px; font-weight:500; cursor:pointer; padding:6px 0; }
.delete .ic{ width:16px; height:16px; }
.done2{ background:var(--brand); color:#fff; border:none; border-radius:12px; padding:11px 24px; font-family:inherit; font-size:14.5px; font-weight:600; cursor:pointer; }
.done2:active{ transform:scale(.96); }
.grip{ flex:none; background:none; border:none; color:var(--ink-faint); padding:6px 2px; margin-left:-2px;
  display:grid; place-items:center; cursor:grab; touch-action:none; opacity:.65; }
.grip:active{ cursor:grabbing; }
.task.lift{ z-index:50; box-shadow:0 12px 28px rgba(30,42,56,.22); background:var(--surface); border-radius:12px; }
.due.clock{ color:var(--brand); background:var(--brand-soft); }
.task.lift .grip{ opacity:1; color:var(--ink-soft); }
.steplist{ list-style:none; display:flex; flex-direction:column; gap:2px; margin-bottom:4px; }
.step{ display:flex; align-items:center; gap:9px; padding:7px 4px; border-radius:9px; background:var(--surface); }
.step.lift{ box-shadow:0 10px 24px rgba(20,30,25,.18); z-index:50; }
.stepcheck{ flex:none; width:22px; height:22px; border-radius:7px; border:2px solid var(--chk); background:transparent; cursor:pointer; display:grid; place-items:center; color:#fff; transition:.18s; }
.stepcheck .ic{ width:13px; height:13px; opacity:0; transform:scale(.4); transition:.18s; }
.stepcheck.on{ background:var(--brand); border-color:var(--brand); }
.stepcheck.on .ic{ opacity:1; transform:scale(1); }
.steptext{ flex:1; font-size:14.5px; color:var(--ink); line-height:1.32; word-break:break-word; }
.steptext.sdone{ color:var(--ink-faint); text-decoration:line-through; }
.stepdel{ flex:none; background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:4px; display:grid; place-items:center; }
.stepdel .ic{ width:15px; height:15px; }
.stepgrip{ flex:none; background:none; border:none; color:var(--ink-faint); padding:4px 2px; display:grid; place-items:center; cursor:grab; touch-action:none; opacity:.6; }
.stepgrip:active{ cursor:grabbing; }
.addstep{ display:flex; align-items:center; gap:9px; padding:2px 0; }
.addstepbtn{ flex:none; width:30px; height:30px; border-radius:9px; border:none; background:var(--brand-soft); color:var(--brand); display:grid; place-items:center; cursor:pointer; }
.addstepbtn .ic{ width:18px; height:18px; }
.stepinput{ flex:1; border:none; border-bottom:1px solid var(--line); background:none; padding:7px 2px; font-family:inherit; font-size:14.5px; color:var(--ink); outline:none; }
.stepinput:focus{ border-color:var(--brand); }
.stepinput::placeholder{ color:var(--ink-faint); }
.stepchip{ display:inline-flex; align-items:center; gap:3px; font-size:12px; font-weight:700; color:var(--teal); background:var(--teal-soft); padding:2px 8px; border-radius:20px; }
.stepchip .ic{ width:12px; height:12px; }
.searchrow{ position:relative; padding:0 16px 10px; z-index:16; }
.searchwrap{ display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--line); border-radius:23px; padding:0 12px 0 14px; height:46px; box-shadow:var(--shadow); }
.searchwrap:focus-within{ border-color:var(--brand); }
.searchicon{ flex:none; color:var(--ink-faint); display:grid; place-items:center; }
.searchicon .ic{ width:18px; height:18px; }
#searchinput{ flex:1; border:none; background:none; font-family:inherit; font-size:15px; color:var(--ink); outline:none; height:100%; min-width:0; }
#searchinput::placeholder{ color:var(--ink-faint); }
.searchclear{ flex:none; background:none; border:none; color:var(--ink-faint); cursor:pointer; padding:5px; display:none; }
.searchclear.show{ display:grid; place-items:center; }
.searchclear .ic{ width:16px; height:16px; }
.searchdrop{ position:absolute; left:16px; right:16px; top:48px; background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:0 12px 30px rgba(20,30,25,.16); max-height:52vh; overflow-y:auto; z-index:18; display:none; }
.searchdrop.show{ display:block; }
.sugg{ display:flex; align-items:center; gap:10px; padding:11px 13px; cursor:pointer; border-bottom:1px solid var(--line); }
.sugg:last-child{ border-bottom:none; }
.sugg:hover, .sugg.active{ background:var(--surface-2); }
.suggmain{ flex:1; min-width:0; }
.suggtitle{ font-size:14.5px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

function nameDay(d){ const mm=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0"); return NAMEDAYS[mm+"-"+dd]||""; }
const localISO=d=>{const z=new Date(d.getTime()-d.getTimezoneOffset()*60000);return z.toISOString().slice(0,10);};
const todayISO=()=>localISO(new Date());
const parseISO=s=>{const[a,b,c]=s.split("-").map(Number);return new Date(a,b-1,c);};
function formatDue(iso){
  const t=todayISO(); if(iso===t)return"Ma";
  const diff=Math.round((parseISO(iso)-parseISO(t))/86400000);
  if(diff===1)return"Holnap"; if(diff===-1)return"Tegnap";
  return parseISO(iso).toLocaleDateString("hu-HU",{month:"short",day:"numeric"});
}
const isOverdue=iso=>iso&&iso<todayISO();
const isTodayDue=iso=>iso===todayISO();
function addDaysISO(n){ const d=new Date(); return localISO(new Date(d.getFullYear(),d.getMonth(),d.getDate()+n)); }
function endOfWeekISO(){ const d=new Date(); const wd=(d.getDay()+6)%7; return localISO(new Date(d.getFullYear(),d.getMonth(),d.getDate()+(6-wd))); }
function dueBucket(iso){
  if(!iso) return null;
  const t=todayISO();
  if(iso<t) return "overdue";
  if(iso===t) return "today";
  if(iso===addDaysISO(1)) return "tomorrow";
  if(iso<=endOfWeekISO()) return "week";
  return "later";
}
function bucketDate(b){
  if(b==="today") return todayISO();
  if(b==="tomorrow") return addDaysISO(1);
  if(b==="week"){ const e=endOfWeekISO(); return e>addDaysISO(1)?e:addDaysISO(2); }
  if(b==="later") return addDaysISO(8);
  return null;
}
function nextWeekdayISO(target){ const cur=new Date().getDay(); let add=(target-cur+7)%7; if(add===0)add=7; return addDaysISO(add); }
function weekendISO(){ const cur=new Date().getDay(); if(cur===6) return todayISO(); if(cur===0) return addDaysISO(6); return addDaysISO(6-cur); }
function nextMondayISO(){ return nextWeekdayISO(1); }
function fridayISO(){ const cur=new Date().getDay(); return addDaysISO((5-cur+7)%7); }
function monthEndISO(){ const d=new Date(); return localISO(new Date(d.getFullYear(), d.getMonth()+1, 0)); }
function formatDayLong(iso){ if(!iso) return ""; return parseISO(iso).toLocaleDateString("hu-HU",{weekday:"short",month:"short",day:"numeric"}); }

}

}
function timeOptions(sel){
  let o='<option value="">– óra:perc –</option>';
  for(let h=8;h<=20;h++){ for(let m=0;m<60;m+=15){ if(h===20&&m>0) break; const v=String(h).padStart(2,"0")+":"+String(m).padStart(2,"0"); o+='<option value="'+v+'"'+(v===sel?" selected":"")+'>'+v+'</option>'; } }
  return o;
}
function hourOptions(sel){ let o='<option value="">óra</option>'; for(let h=8;h<=20;h++){ const v=String(h).padStart(2,"0"); o+='<option value="'+v+'"'+(v===sel?" selected":"")+'>'+v+'</option>'; } return o; }
function minuteOptions(sel){ let o='<option value="">perc</option>'; ["00","15","30","45"].forEach(v=>{ o+='<option value="'+v+'"'+(v===sel?" selected":"")+'>'+v+'</option>'; }); return o; }
function daysAgo(ts){ return ts?Math.floor((Date.now()-ts)/86400000):null; }
function barChart(title, rows, accent){
  const max=Math.max(1,...rows.map(r=>r.value));
  const bars=rows.map(r=>'<div class="chrow"><div class="chlabel">'+esc(r.label)+'</div><div class="chbarwrap"><div class="chbar" style="width:'+Math.max(3,Math.round(r.value/max*100))+'%'+(accent?';background:'+accent:'')+'"></div></div><div class="chval">'+esc(r.display!=null?r.display:String(r.value))+'</div></div>').join("");
  return '<div class="chartcard"><div class="charttitle">'+esc(title)+'</div>'+(rows.length?bars:'<div class="chempty">Még nincs adat</div>')+'</div>';
}
function colChart(title, counts, labels, hint){
  const max=Math.max(1,...counts);
  const bars=counts.map((c,i)=>'<div class="colbar"><div class="colwrap"><div class="colfill" style="height:'+Math.max(2,Math.round(c/max*100))+'%" title="'+c+'"></div></div><div class="collab">'+(labels[i]!=null?labels[i]:"")+'</div></div>').join("");
  return '<div class="chartcard"><div class="charttitle">'+esc(title)+'</div><div class="colchart">'+bars+'</div>'+(hint?'<div class="chhint">'+esc(hint)+'</div>':'')+'</div>';
}
function statsHTML(){
  const tasks=data.tasks;
  const total=tasks.length;
  const done=tasks.filter(t=>t.done).length;
  const active=total-done;
  const rate=total?Math.round(done/total*100):0;
  const overdue=tasks.filter(t=>!t.done&&isOverdue(t.due)).length;
  const createdTotal=(data.createdTotal!=null)?data.createdTotal:total;
  const first=total?Math.min.apply(null,tasks.map(t=>t.createdAt||Date.now())):null;
  const daysUsing=first?(Math.floor((Date.now()-first)/86400000)+1):0;
  const firstStr=first?new Date(first).toLocaleDateString("hu-HU",{year:"numeric",month:"long",day:"numeric"}):"—";
  const short=s=>{ s=s||"(névtelen)"; return s.length>26?s.slice(0,25)+"…":s; };
  const activeTasks=tasks.filter(t=>!t.done);

  const card=(label,val,sub)=>'<div class="statcard"><div class="statval">'+val+'</div><div class="statlabel">'+label+'</div>'+(sub?'<div class="statsub">'+sub+'</div>':'')+'</div>';

  // legtöbbet megnyitva
  const mostOpened=tasks.filter(t=>t.openCount).sort((a,b)=>b.openCount-a.openCount).slice(0,6)
    .map(t=>({label:short(t.title),value:t.openCount,display:t.openCount+"×"}));
  // legtöbb idő nyitva (perc)
  const mostTime=tasks.filter(t=>t.totalOpenMs).sort((a,b)=>b.totalOpenMs-a.totalOpenMs).slice(0,6)
    .map(t=>({label:short(t.title),value:t.totalOpenMs,display:Math.max(1,Math.round(t.totalOpenMs/60000))+" p"}));
  // legtöbbet szerkesztve
  const mostEdited=tasks.filter(t=>t.editCount).sort((a,b)=>b.editCount-a.editCount).slice(0,6)
    .map(t=>({label:short(t.title),value:t.editCount,display:t.editCount+"×"}));
  // legtöbbet késik (nap)
  const late=activeTasks.filter(t=>isOverdue(t.due)).map(t=>({t,d:Math.floor((parseISO(todayISO())-parseISO(t.due))/86400000)}))
    .sort((a,b)=>b.d-a.d).slice(0,6).map(x=>({label:short(x.t.title),value:x.d,display:x.d+" nap"}));
  // legrégebb óta a rendszerben
  const oldest=activeTasks.slice().sort((a,b)=>(a.createdAt||0)-(b.createdAt||0)).slice(0,6)
    .map(t=>({label:short(t.title),value:daysAgo(t.createdAt)||0,display:(daysAgo(t.createdAt)||0)+" nap"}));
  // elhanyagolt (legrégebben megnyitva / soha)
  const neglect=activeTasks.slice().sort((a,b)=>(a.lastOpenedAt||0)-(b.lastOpenedAt||0)).slice(0,6)
    .map(t=>({label:short(t.title),value:(t.lastOpenedAt?daysAgo(t.lastOpenedAt):9999),display:t.lastOpenedAt?(daysAgo(t.lastOpenedAt)+" napja")+"":"soha"}));
  // használat óra / nap szerint
  const hours=new Array(24).fill(0), wdays=new Array(7).fill(0);
  (data.usageLog||[]).forEach(ts=>{ const d=new Date(ts); hours[d.getHours()]++; wdays[(d.getDay()+6)%7]++; });
  const hourLabels=hours.map((_,h)=>h%6===0?h:"");
  const wdayLabels=["H","K","Sze","Cs","P","Szo","V"];
  // keresések
  const searches=Object.values(data.searches||{}).sort((a,b)=>b.n-a.n).slice(0,12);
  // --- 3a mutatók ---
  const nowD=new Date(); const wd0=(nowD.getDay()+6)%7; const weekStart=new Date(nowD.getFullYear(),nowD.getMonth(),nowD.getDate()-wd0).getTime();
  const doneToday=tasks.filter(t=>t.done&&t.completedAt&&isTodayDue(localISO(new Date(t.completedAt)))).length;
  const weekAct=new Array(7).fill(0);
  tasks.forEach(t=>{ if(t.done&&t.completedAt&&t.completedAt>=weekStart){ weekAct[(new Date(t.completedAt).getDay()+6)%7]++; } });
  const daySet={}; tasks.forEach(t=>{ if(t.done&&t.completedAt) daySet[localISO(new Date(t.completedAt))]=1; });
  let streak=0, sd=new Date(); if(!daySet[localISO(sd)]) sd=new Date(Date.now()-86400000);
  while(daySet[localISO(sd)]){ streak++; sd=new Date(sd.getTime()-86400000); }
  const parts=[0,0,0,0];
  (data.usageLog||[]).forEach(ts=>{ const h=new Date(ts).getHours(); if(h>=5&&h<9)parts[0]++; else if(h>=9&&h<12)parts[1]++; else if(h>=12&&h<18)parts[2]++; else parts[3]++; });
  const attention=activeTasks.map(t=>{
    let reason="", pr=0;
    if(t.lastOpenedAt){ const w=Math.floor((daysAgo(t.lastOpenedAt)||0)/7); if(w>=1){ reason=w+" hete nem nyitottad meg"; pr=daysAgo(t.lastOpenedAt)||0; } }
    else { const w=Math.floor((daysAgo(t.createdAt)||0)/7); if(w>=1){ reason=w+" hete érintetlen"; pr=daysAgo(t.createdAt)||0; } }
    if(!t.due){ reason=reason||"nincs határidő"; pr=Math.max(pr,4); }
    return {t,reason,pr};
  }).filter(x=>x.reason).sort((a,b)=>b.pr-a.pr).slice(0,4);
  const RC=2*Math.PI*52, roff=RC*(1-rate/100);

  return '<div class="statspage v1b">'
    +'<button class="printbtn" data-action="printtoday">'+icon("file")+' Napi feladatok nyomtatása</button>'
    +'<label class="printopt"><input type="checkbox" id="printnotes"'+(printNotes?" checked":"")+'> Leírásokkal együtt nyomtat</label>'
    +'<div class="s3hero">'
      +'<div class="s3ring"><svg viewBox="0 0 120 120"><circle class="s3rbg" cx="60" cy="60" r="52"/><circle class="s3rfg" cx="60" cy="60" r="52" stroke-dasharray="'+RC.toFixed(1)+'" stroke-dashoffset="'+roff.toFixed(1)+'"/></svg><div class="s3rtext"><div class="s3pct">'+rate+'%</div><div class="s3plab">kész</div></div></div>'
      +'<div class="s3hright"><div class="s3htitle">Teljesítve összesen</div><div class="s3hsub">'+done+' / '+total+' feladat</div>'
        +(streak?'<div class="s3streak">'+icon("flame")+streak+' napos lendület</div>':'')+'</div>'
    +'</div>'
    +'<div class="s3nums">'
      +'<div class="s3num" data-action="statnav" data-target="all"><b>'+active+'</b><span>Aktív</span></div>'
      +'<div class="s3num" data-action="statnav" data-target="overdue"><b class="red">'+overdue+'</b><span>Késett</span></div>'
      +'<div class="s3num"><b class="teal">'+doneToday+'</b><span>Ma kész</span></div>'
    +'</div>'
    +colChart("Heti aktivitás",weekAct,["H","K","Sze","Cs","P","Szo","V"])
    +barChart("Mikor dolgozol",[{label:"Reggel",value:parts[0]},{label:"Délelőtt",value:parts[1]},{label:"Délután",value:parts[2]},{label:"Este",value:parts[3]}])
    +'<div class="chartcard"><div class="charttitle">Figyelmet igényel</div>'
      +(attention.length?attention.map(x=>'<button class="attnrow" data-action="open" data-id="'+x.t.id+'"><span class="attntitle">'+esc(x.t.title)+'</span><span class="attnreason">'+esc(x.reason)+'</span></button>').join(""):'<div class="chempty">Minden rendben — nincs elhanyagolt feladat</div>')
    +'</div>'
    +'<div class="statsince"><div class="statsincetop">'+icon("calendar")+' Az első feladat óta</div>'
      +'<div class="statsinceval">'+firstStr+'</div>'
      +'<div class="statsincesub">'+(daysUsing?(daysUsing+" napja használod az appot"):"még nincs feladat")+'</div></div>'
    +barChart("Legtöbbet megnyitott feladatok",mostOpened)
    +barChart("Legtöbb időt nyitva tartott (perc)",mostTime)
    +barChart("Legtöbbet szerkesztett feladatok",mostEdited)
    +barChart("Legtöbbet késő feladatok",late,"#C0432B")
    +barChart("Legrégebb óta a rendszerben",oldest)
    +barChart("Legrégebben megnyitott (elhanyagolt)",neglect,"#E0962A")
    +colChart("Mikor használod — óra szerint",hours,hourLabels,"A nap mely óráiban nyitod meg a feladatokat")
    +colChart("Mikor használod — nap szerint",wdays,wdayLabels)
    +'<div class="chartcard"><div class="charttitle">Keresett kifejezések</div>'
      +(searches.length?searches.map(s=>'<div class="searchrowitem"><span class="searchq">'+esc(s.q)+'</span><span class="searchn">'+s.n+'×</span></div>').join(""):'<div class="chempty">Még nincs keresés</div>')
    +'</div>'
    +'</div>';
}
function printDaily(){
  const today=todayISO(), tom=addDaysISO(1);
  const sortP=(a,b)=>{ if(!!a.important!==!!b.important) return a.important?-1:1; return (a.order||0)-(b.order||0); };
  const overdueT=data.tasks.filter(t=>!t.done&&isOverdue(t.due)).sort(sortP);
  const todayT=data.tasks.filter(t=>!t.done&&t.due===today).sort(sortP);
  const tomT=data.tasks.filter(t=>!t.done&&t.due===tom).sort(sortP);
  const doneToday=data.tasks.filter(t=>t.done&&t.completedAt&&isTodayDue(localISO(new Date(t.completedAt)))).length;
  const imp=arr=>arr.filter(t=>t.important).length;
  const row=t=>{
    const ln=listById(t.listId);
    const steps=(t.steps||[]).map(s=>'<div class="pstep">'+(s.done?"☑":"☐")+' '+esc(s.text)+'</div>').join("");
    const meta=[ln?esc(ln.name):"", t.due&&isOverdue(t.due)?formatDue(t.due):"", (!t.done&&t.reminder)?t.reminder.slice(11,16):""].filter(Boolean).join("  ·  ");
    return '<div class="pitem"><span class="pcheck">☐</span><div class="pbody"><div class="ptitle">'+(t.important?"★ ":"")+esc(t.title)+'</div>'
      +(meta?'<div class="pmeta">'+meta+'</div>':'')+(steps?'<div class="psteps">'+steps+'</div>':'')
      +((printNotes&&t.note)?'<div class="pnote">'+esc(t.note)+'</div>':'')+'</div></div>';
  };
  const sec=(label,arr)=>arr.length?('<div class="psec">'+label+' ('+arr.length+')</div>'+arr.map(row).join("")):'';
  const dateStr=new Date().toLocaleDateString("hu-HU",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  const nToday=nameDay(new Date()), nTom=nameDay(new Date(Date.now()+86400000));
  const listNames=data.lists.map(l=>esc(l.name)).join(" · ");
  const totalActive=overdueT.length+todayT.length;
  let pa=document.getElementById("printarea"); if(!pa){ pa=document.createElement("div"); pa.id="printarea"; document.body.appendChild(pa); }
  pa.innerHTML='<div class="pbrand">Feladatok</div>'
    +'<h1 class="ph1">Teendők — '+dateStr+'</h1>'
    +'<div class="psub">'+totalActive+' aktív · '+doneToday+' kész ma · '+listNames+'</div>'
    +'<div class="pnames">Névnap — <b>Ma:</b> '+esc(nToday||"—")+' · <b>Holnap:</b> '+esc(nTom||"—")+'</div>'
    +'<div class="pcount">Ma: <b>'+todayT.length+'</b> feladat (fontos: '+imp(todayT)+') · Késett: <b>'+overdueT.length+'</b> · Holnap: <b>'+tomT.length+'</b> (fontos: '+imp(tomT)+')</div>'
    +sec("Késett",overdueT)+sec("Ma",todayT)+sec("Holnap",tomT)
    +((overdueT.length+todayT.length+tomT.length)===0?'<p class="pempty">Nincs esedékes feladat.</p>':'')
    +'<div class="pnotes"><div class="psec">Megjegyzések</div><div class="pline"></div><div class="pline"></div><div class="pline"></div></div>'
    +'<div class="pfoot">Nyomtatva: '+new Date().toLocaleString("hu-HU")+' · feladatok.app · 1 / 1</div>';
  setTimeout(()=>{ try{ window.print(); }catch(e){ showToast("Ezen az eszközön a böngésző nyomtatás/megosztás menüjét használd."); } }, 60);

function readAttachment(file, cb){
  if(file.type && file.type.indexOf("image/")===0){
    const url=URL.createObjectURL(file), img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(url);
      const max=1400; let w=img.width, h=img.height;
      if(w>max||h>max){ const s=Math.min(max/w,max/h); w=Math.round(w*s); h=Math.round(h*s); }
      try{ const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
        const durl=c.toDataURL("image/jpeg",0.7);
        cb({name:file.name.replace(/\.(png|heic|heif|webp|jpeg)$/i,".jpg"),type:"image/jpeg",size:Math.round(durl.length*0.75),data:durl});
      }catch(err){ cb(null); }
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); cb(null); };
    img.src=url;
  } else {
    const rd=new FileReader();
    rd.onload=()=>cb({name:file.name,type:file.type||"",size:file.size,data:rd.result});
    rd.onerror=()=>cb(null);
    rd.readAsDataURL(file);
  }
}

function idMap(arr){ const m={}; (arr||[]).forEach(x=>{ if(x&&x.id) m[x.id]=x; }); return m; }
function mergeById(localArr, remoteArr, delMap){
  const l=idMap(localArr), r=idMap(remoteArr);
  const ids={}; Object.keys(l).forEach(k=>ids[k]=1); Object.keys(r).forEach(k=>ids[k]=1);
  const out=[];
  Object.keys(ids).forEach(id=>{
    const li=l[id], ri=r[id];
    let chosen;
    if(li&&ri){
      const lm=li.mod||0, rm=ri.mod||0;
      if(rm>lm) chosen=ri; else if(lm>rm) chosen=li;
      else chosen=(JSON.stringify(ri)>JSON.stringify(li))?ri:li; // döntetlennél stabil, mindkét eszközön azonos
    } else chosen=li||ri;
    if(!chosen) return;
    const delTs=delMap[id]||0;
    if(delTs && delTs>=(chosen.mod||chosen.createdAt||0)) return;
    out.push(chosen);
  });
  return out;
}
function stableStr(v){
  if(Array.isArray(v)) return "["+v.map(stableStr).join(",")+"]";
  if(v && typeof v==="object"){ return "{"+Object.keys(v).sort().map(k=>JSON.stringify(k)+":"+stableStr(v[k])).join(",")+"}"; }
  return JSON.stringify(v);
}
function canonicalBlob(d){
  const byId=(a)=>(a||[]).slice().sort((x,y)=>x.id<y.id?-1:(x.id>y.id?1:0));
  return stableStr({ lists:byId(d.lists), tasks:byId(d.tasks), deleted:d.deleted||{}, createdTotal:d.createdTotal||0, atts:d.atts||{} });
}
function mergeUsage(a,b){
  const s={}; (a||[]).concat(b||[]).forEach(t=>{ s[t]=1; });
  const arr=Object.keys(s).map(Number).sort((x,y)=>x-y);
  return arr.length>1500?arr.slice(-1500):arr;
}
function mergeSearches(a,b){
  const out={}; [a||{},b||{}].forEach(m=>{ Object.keys(m).forEach(k=>{ const e=m[k]; if(!out[k]) out[k]={q:e.q,n:0,last:0}; out[k].n=Math.max(out[k].n,e.n||0); out[k].last=Math.max(out[k].last,e.last||0); out[k].q=e.q||out[k].q; }); });
  return out;
}
function mergeAtts(a,b){
  const out={}; [a||{},b||{}].forEach(m=>{ Object.keys(m).forEach(tid=>{ const seen=out[tid]?out[tid].map(x=>x.id):[]; out[tid]=out[tid]||[]; (m[tid]||[]).forEach(at=>{ if(seen.indexOf(at.id)<0){ out[tid].push(at); seen.push(at.id); } }); }); });
  return out;
}
function mergeData(local, remote){
  const delMap={}; [remote.deleted||{}, local.deleted||{}].forEach(dm=>{ Object.keys(dm).forEach(id=>{ if(!delMap[id]||dm[id]>delMap[id]) delMap[id]=dm[id]; }); });
  return {
    lists: mergeById(local.lists, remote.lists, delMap),
    tasks: mergeById(local.tasks, remote.tasks, delMap),
    deleted: delMap,
    createdTotal: Math.max(local.createdTotal||0, remote.createdTotal||0),
    usageLog: mergeUsage(local.usageLog, remote.usageLog),
    searches: mergeSearches(local.searches, remote.searches),
    atts: mergeAtts(local.atts, remote.atts)
  };
}

/* ----------------------------- műveletek ----------------------------- */
function addTask(val){
  const title=(val||"").trim(); if(!title)return;
  let listId,important=false;
  if(view.type==="list")listId=view.key;
  else{ listId=data.lists[0].id; if(view.key==="important")important=true; }
  const minOrder=data.tasks.length?Math.min(...data.tasks.map(t=>typeof t.order==="number"?t.order:0)):0;
  const nt={id:uid(),listId,title,done:false,important,note:"",due:todayISO(),createdAt:Date.now(),mod:Date.now(),order:minOrder-1};
  data.tasks.push(nt);
  data.createdTotal=(data.createdTotal||0)+1;
  save();
  openTaskId=nt.id; dueOpen=false; remindOpen=false;
  render();
}
function addStep(taskId, text){
  text=(text||"").trim(); if(!text)return;
  const t=data.tasks.find(x=>x.id===taskId); if(!t)return;
  if(!t.steps)t.steps=[];
  const maxO=t.steps.length?Math.max(...t.steps.map(s=>s.order)):-1;
  t.steps.push({id:uid(),text,done:false,order:maxO+1}); t.mod=Date.now();
  save(); focusStep=true; render();
}
function addList(val){
  const name=(val||"").trim(); if(!name)return;
  const id=uid();
  data.lists.push({id,name,color:LIST_COLORS[data.lists.length%LIST_COLORS.length],mod:Date.now()});
  save(); view={type:"list",key:id}; drawerOpen=false; render();
}
function delList(id){
  if(data.lists.length<=1)return;
  if(!data.deleted)data.deleted={};
  const now=Date.now();
  data.lists=data.lists.filter(l=>l.id!==id);
  data.tasks.forEach(t=>{ if(t.listId===id) data.deleted[t.id]=now; });
  data.tasks=data.tasks.filter(t=>t.listId!==id);
  data.deleted[id]=now;
  if(view.type==="list"&&view.key===id)view={type:"smart",key:"today"};
  save(); render();
}

  else if(a==="dellist"){delList(id);}

  else if(a==="duetoday"){const t=data.tasks.find(x=>x.id===id);t.due=todayISO();save();render();}

  else if(a==="remindquick"){const t=data.tasks.find(x=>x.id===id);const base=(t.due||todayISO());t.reminder=base+"T"+el.dataset.time;t.reminderFired=false;requestNotify();save();render();}
  else if(a==="remindhour"){const t=data.tasks.find(x=>x.id===id);const date=(t.reminder?t.reminder.slice(0,10):(t.due||todayISO()));const mm=(t.reminder&&t.reminder.slice(14,16))||"00";t.reminder=date+"T"+el.dataset.hour+":"+mm;t.reminderFired=false;requestNotify();save();render();}
  else if(a==="remindmin"){const t=data.tasks.find(x=>x.id===id);const date=(t.reminder?t.reminder.slice(0,10):(t.due||todayISO()));const hh=(t.reminder&&t.reminder.slice(11,13))||"09";t.reminder=date+"T"+hh+":"+el.dataset.min;t.reminderFired=false;requestNotify();save();render();}
  else if(a==="duetomorrow"){const t=data.tasks.find(x=>x.id===id);t.due=localISO(new Date(Date.now()+86400000));save();render();}
  else if(a==="dueclear"){const t=data.tasks.find(x=>x.id===id);t.due="";save();if(window.innerWidth>700){schedOpen=false;dueOpen=false;}render();}

/* ----------------------------- kereső (autocomplete) ----------------------------- */
function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function highlight(text, rawQ){
  if(!rawQ) return esc(text);
  const idx=text.toLowerCase().indexOf(rawQ.toLowerCase());
  if(idx<0) return esc(text);
  return esc(text.slice(0,idx))+'<b>'+esc(text.slice(idx,idx+rawQ.length))+'</b>'+esc(text.slice(idx+rawQ.length));
}
function attachSearch(){
  const si=document.getElementById("searchinput");
  const drop=document.getElementById("searchdrop");
  const clr=document.querySelector(".searchclear");
  if(!si)return;
  si.addEventListener("input",()=>{ searchQuery=si.value; updateSearch(); });
  si.addEventListener("keydown",onSearchKey);
  si.addEventListener("blur",()=>{ setTimeout(()=>{ if(!suggPicking&&drop){ drop.classList.remove("show"); } }, 160); });
  if(drop) drop.addEventListener("pointerdown",()=>{ suggPicking=true; });
  if(drop) drop.addEventListener("click",e=>{ const s=e.target.closest(".sugg"); if(s&&s.dataset.id){ openSuggestion(s.dataset.id); } suggPicking=false; });
  if(clr) clr.addEventListener("click",()=>{ si.value=""; searchQuery=""; updateSearch(); si.focus(); });
  if(focusSearch){ si.focus(); focusSearch=false; }
}
function matchTask(t,q){
  if(norm(t.title).includes(q)) return "title";
  if(t.note && norm(t.note).includes(q)) return "note";
  if(t.steps && t.steps.some(s=>norm(s.text).includes(q))) return "step";
  return null;
}
function updateSearch(){
  const si=document.getElementById("searchinput");
  const drop=document.getElementById("searchdrop");
  const clr=document.querySelector(".searchclear");
  if(!si||!drop)return;
  const raw=si.value.trim(), q=norm(raw);
  if(clr) clr.classList.toggle("show", si.value.length>0);
  searchSel=-1;
  if(!q){ drop.classList.remove("show"); drop.innerHTML=""; return; }
  const matches=[];
  for(const t of data.tasks){ const via=matchTask(t,q); if(via){ matches.push({t,via}); if(matches.length>=12)break; } }
  if(!matches.length){ drop.innerHTML='<div class="suggempty">Nincs találat</div>'; drop.classList.add("show"); return; }
  drop.innerHTML=matches.map((m,i)=>{
    const t=m.t, ln=listById(t.listId);
    let sub="";
    if(m.via==="step"){ const s=t.steps.find(s=>norm(s.text).includes(q)); if(s) sub="↳ lépés: "+esc(s.text); }
    else if(m.via==="note"){ sub="↳ a jegyzetben"; }
    const meta=esc(ln?ln.name:"")+(t.due?" · "+formatDue(t.due):"")+((t.steps&&t.steps.length)?" · "+t.steps.filter(s=>s.done).length+"/"+t.steps.length:"");
    return '<div class="sugg" data-id="'+t.id+'">'
      +'<span class="dot" style="background:'+(ln?ln.color:"var(--ink-faint)")+'"></span>'
      +'<div class="suggmain"><div class="suggtitle'+(t.done?" sdone":"")+'">'+highlight(t.title,raw)+'</div>'
      +'<div class="suggmeta">'+meta+'</div>'
      +(sub?'<div class="suggsub">'+sub+'</div>':'')
      +'</div></div>';
  }).join("");
  drop.classList.add("show");
}
function onSearchKey(e){
  const drop=document.getElementById("searchdrop");
  const items=drop?Array.from(drop.querySelectorAll(".sugg")):[];
  if(e.key==="ArrowDown"){ e.preventDefault(); if(!items.length)return; searchSel=(searchSel+1)%items.length; paintSel(items); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); if(!items.length)return; searchSel=(searchSel-1+items.length)%items.length; paintSel(items); }
  else if(e.key==="Enter"){ e.preventDefault(); const pick=searchSel>=0?items[searchSel]:items[0]; if(pick&&pick.dataset.id) openSuggestion(pick.dataset.id); }
  else if(e.key==="Escape"){ const si=document.getElementById("searchinput"); si.value=""; searchQuery=""; updateSearch(); si.blur(); }
}
function paintSel(items){ items.forEach((el,i)=>el.classList.toggle("active",i===searchSel)); if(items[searchSel]) items[searchSel].scrollIntoView({block:"nearest"}); }
function openSuggestion(id){
  const t=data.tasks.find(x=>x.id===id); if(!t)return;
  logSearch(searchQuery);
  searchQuery=""; suggPicking=false;
  view={type:"list",key:t.listId};
  trackOpen(id); openTaskId=id; dueOpen=false; remindOpen=false; schedOpen=false;
  render();
}

/* ----------------------------- húzásos átrendezés ----------------------------- */
let lpTimer=null, lpData=null;
function setupDrag(){
  document.querySelectorAll(".task .grip").forEach(h=>{ h.addEventListener("pointerdown",e=>beginDrag(e,".task",ids=>{ applyVisibleOrder(ids); save(); })); });
  document.querySelectorAll(".step .stepgrip").forEach(h=>{ h.addEventListener("pointerdown",e=>beginDrag(e,".step",ids=>{ applyStepOrder(openTaskId,ids); save(); })); });
  document.querySelectorAll(".task .taskbody").forEach(b=>{ b.addEventListener("pointerdown",e=>longPressStart(e,".task",ids=>{ applyVisibleOrder(ids); save(); })); });
}
function longPressStart(e, rowSel, onReorder){
  if(!e.isPrimary || dragState) return;
  const li=e.target.closest(rowSel); if(!li) return;
  const body=e.currentTarget, pid=e.pointerId, sx=e.clientX, sy=e.clientY;
  const move=ev=>{ if(Math.abs(ev.clientY-sy)>9 || Math.abs(ev.clientX-sx)>9) cancelLP(); };
  const end=()=>cancelLP();
  lpData={body,move,end};
  body.addEventListener("pointermove",move);
  body.addEventListener("pointerup",end);
  body.addEventListener("pointercancel",end);
  lpTimer=setTimeout(()=>{
    lpTimer=null; clearLPListeners();
    startDragFrom(li, rowSel, pid, sy, onReorder);
  }, 230);
}
function clearLPListeners(){ if(lpData){ lpData.body.removeEventListener("pointermove",lpData.move); lpData.body.removeEventListener("pointerup",lpData.end); lpData.body.removeEventListener("pointercancel",lpData.end); lpData=null; } }
function cancelLP(){ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } clearLPListeners(); }
function beginDrag(e, rowSel, onReorder){
  if(!e.isPrimary)return;
  e.preventDefault();
  startDragFrom(e.target.closest(rowSel), rowSel, e.pointerId, e.clientY, onReorder);
}
function startDragFrom(li, rowSel, pointerId, startY, onReorder){
  if(!li) return;
  const tl=(rowSel===".task")?li.closest(".tlgroup"):null;
  let itemsEls;
  if(tl){ itemsEls=Array.from(document.querySelectorAll(".scroll .task")); }
  else { const ul=li.parentNode; itemsEls=Array.from(ul.children).filter(c=>c.matches(rowSel)); }
  const items=itemsEls.map(el=>{ const r=el.getBoundingClientRect(); return {el,id:el.dataset.id,center:r.top+r.height/2}; });
  const index=items.findIndex(it=>it.el===li);
  dragState={ li, items, index, target:index, startY, lastY:startY, height:li.getBoundingClientRect().height, moved:false, pid:pointerId, onReorder, cross:!!tl };
  try{ li.setPointerCapture(pointerId); }catch(_){}
  li.classList.add("lift");
  li.addEventListener("pointermove",onGripMove);
  li.addEventListener("pointerup",onGripUp);
  li.addEventListener("pointercancel",onGripUp);
}
function onGripMove(e){
  const d=dragState; if(!d)return;
  e.preventDefault();
  d.lastY=e.clientY;
  const dy=e.clientY-d.startY;
  if(Math.abs(dy)>4)d.moved=true;
  d.li.classList.add("lift");
  d.li.style.transform="translateY("+dy+"px)";
  const center=d.items[d.index].center+dy;
  let target=d.index;
  while(target>0 && center<d.items[target-1].center) target--;
  while(target<d.items.length-1 && center>d.items[target+1].center) target++;
  d.target=target;
  d.items.forEach((it,i)=>{
    if(it.el===d.li)return;
    let shift=0;
    if(d.index<target && i>d.index && i<=target) shift=-d.height;
    else if(d.index>target && i>=target && i<d.index) shift=d.height;
    it.el.style.transition="transform .16s ease";
    it.el.style.transform=shift?"translateY("+shift+"px)":"";
  });
}
function onGripUp(){
  const d=dragState; if(!d)return;
  d.li.removeEventListener("pointermove",onGripMove);
  d.li.removeEventListener("pointerup",onGripUp);
  d.li.removeEventListener("pointercancel",onGripUp);
  d.items.forEach(it=>{ it.el.style.transition=""; it.el.style.transform=""; });
  d.li.classList.remove("lift");
  if(d.moved){
    let handled=false;
    if(d.cross){
      const cy=d.items[d.index].center + ((d.lastY||d.startY)-d.startY);
      let tb=null;
      document.querySelectorAll(".scroll .tlgroup").forEach(g=>{ const r=g.getBoundingClientRect(); if(cy>=r.top-8 && cy<=r.bottom+8){ const ul=g.querySelector("[data-bucket]"); if(ul) tb=ul.dataset.bucket; } });
      const t=data.tasks.find(x=>x.id===d.items[d.index].id);
      const sb=t?dueBucket(t.due):null;
      if(t && tb && tb!==sb){ const nd=bucketDate(tb); if(nd){ t.due=nd; t.mod=Date.now(); setLocalTs(Date.now()); saveLocal(); pushToCloud(); handled=true; } }
    }
    if(!handled && d.target!==d.index){
      const ids=d.items.map(it=>it.id);
      const[m]=ids.splice(d.index,1);
      ids.splice(d.target,0,m);
      d.onReorder(ids);
    }
  }
  suppressClick=true; setTimeout(()=>{ suppressClick=false; },80);
  dragState=null;
  render();
}

/* ----------------------------- leírás: linkek felismerése ----------------------------- */
function normPhone(raw){
  if(!raw) return null;
  let s=raw.replace(/[^\d+]/g,"");
  if(s.indexOf("+")>0) s=s.replace(/\+/g,"");
  if(s.startsWith("00")) s="+"+s.slice(2);
  if(s.startsWith("+")){
    const dg=s.slice(1).replace(/\D/g,"");
    return (dg.length>=9&&dg.length<=15)?("+"+dg):null;
  }
  let n=s.replace(/\D/g,"");
  if(n.startsWith("06")) n="36"+n.slice(2);
  else if(n.startsWith("36")){}
  else if(/^(1|20|21|30|31|50|70)/.test(n)&&n.length===9) n="36"+n;
  else return null;
  return (n.length>=10&&n.length<=12)?("+"+n):null;
}
function webKey(href){ return "web|"+href.replace(/^https?:\/\//i,"").replace(/^www\./i,"").replace(/\/+$/,"").toLowerCase(); }
function extractLinks(text){
  if(!text) return [];
  const map=new Map();
  const putWeb=(label,href)=>{
    if(!/^https?:\/\//i.test(href)) href="https://"+href.replace(/^\/+/,"");
    const k=webKey(href), ex=map.get(k);
    if(!ex){ map.set(k,{type:"web",label:label||href.replace(/^https?:\/\//i,""),href}); }
    else{ if(/^https:/i.test(href)&&/^http:/i.test(ex.href)) ex.href=href; }
  };
  const putEmail=(em)=>{ const k="email|"+em.toLowerCase(); if(!map.has(k)) map.set(k,{type:"email",label:em,href:"mailto:"+em}); };
  const putPhone=(raw)=>{ const p=normPhone(raw); if(!p) return; const k="phone|"+p; if(!map.has(k)) map.set(k,{type:"phone",label:p,href:"tel:"+p}); };
  const classify=(label,target)=>{
    let t=(target||"").trim();
    if(/^mailto:/i.test(t)) return putEmail(t.replace(/^mailto:/i,""));
    if(/^tel:/i.test(t)) return putPhone(t.replace(/^tel:/i,""));
    if(/^[\w.+-]+@[\w-]+\.[\w.-]+$/.test(t)) return putEmail(t);
    if(/^https?:\/\//i.test(t)) return putWeb(label,t);
    if(/^www\./i.test(t)) return putWeb(label,t);
    const ph=normPhone(t); if(ph&&/[\d]/.test(t)&&/^[\d+\s\-\/().]+$/.test(t)) return putPhone(t);
    if(/^[\w-]+(\.[\w-]+)+(\/.*)?$/.test(t)) return putWeb(label,t);
  };
  let work=text;
  work=work.replace(/\[([^\]]*)\]\(([^)]+)\)/g,(m,l,tg)=>{ classify(l.trim()||tg.trim(),tg.trim()); return " "; });
  work=work.replace(/<([^>\s]+)>/g,(m,tg)=>{ classify(tg.trim(),tg.trim()); return " "; });
  work=work.replace(/[\w.+-]+@[\w-]+\.[\w.-]+/g,(m)=>{ putEmail(m); return " "; });
  work=work.replace(/(?:https?:\/\/|www\.)[^\s<>()]+/gi,(m)=>{ classify(m,m); return " "; });
  work.replace(/\+?\d[\d\s\-().]{7,}\d/g,(m)=>{ if(/\d[\/.]\d{2,}[\/.]/.test(m)) return m; putPhone(m); return m; });
  return Array.from(map.values());
}
function looksLikeName(line){
  const s=(line||"").trim();
  if(!s || s.length>40) return false;
  if(/[@:\/0-9]/.test(s)) return false;
  if(/https?:|www\./i.test(s)) return false;
  const words=s.split(/\s+/);
  if(words.length<1 || words.length>4) return false;
  return words.every(w=>/^[A-ZÁÉÍÓÖŐÚÜŰ][\wáéíóöőúüűa-zA-Z.\-]*$/.test(w));
}
function isNameHeader(line){
  const m=(line||"").match(/^\s*(.{2,48}?)\s*:\s*$/);
  if(!m) return null;
  const c=m[1].trim();
  if(!/[A-Za-zÁÉÍÓÖŐÚÜŰáéíóöőúüű]/.test(c)) return null;
  if(/@|https?:|www\./i.test(c)) return null;
  if(extractLinks(c).length) return null;
  return c.replace(/\s*[-–—]\s*$/,"");
}
function contactGroups(text){
  if(!text) return [];
  const lines=text.split(/\r?\n/);
  const groups=[];
  const nameRe=/^\s*(feladó|felado|név|nev|name|kapcsolattartó|kapcsolattarto|ügyintéző|ugyintezo|kontakt|contact|cég|ceg|partner|ügyfél|ugyfel)\s*[:\-]\s*(.+?)\s*$/i;
  const ensure=(name)=>{ let g=groups.find(x=>x.name===name); if(!g){ g={name,items:[],seen:new Set()}; groups.push(g); } return g; };
  let cur=null;
  for(const line of lines){
    const nm=line.match(nameRe);
    if(nm){ cur=ensure(nm[2].trim()); continue; }
    const hdr=isNameHeader(line);
    if(hdr){ cur=ensure(hdr); continue; }
    if(looksLikeName(line)){ cur=ensure(line.trim()); continue; }
    const links=extractLinks(line);
    if(links.length){
      const g=cur||ensure("");
      links.forEach(l=>{ const k=l.type+"|"+l.href.toLowerCase(); if(!g.seen.has(k)){ g.seen.add(k); g.items.push(l); } });
    }
  }
  return groups.filter(g=>g.items.length);
}
function linksHTML(text){
  const groups=contactGroups(text);
  if(!groups.length) return "";
  const ic={web:"globe",email:"mail",phone:"phone"};
  let html='<div class="linkshead">Felismert kapcsolatok</div>';
  groups.forEach(g=>{
    html+='<div class="linkgroup">';
    if(g.name) html+='<div class="linkname">'+icon("user")+esc(g.name)+'</div>';
    html+=g.items.map(l=>{
      const attrs=l.type==="web"?' target="_blank" rel="noopener noreferrer"':"";
      return '<a class="linkrow '+l.type+'" href="'+esc(l.href)+'"'+attrs+'>'
        +'<span class="linkicon">'+icon(ic[l.type])+'</span>'
        +'<span class="linktext">'+esc(l.label)+'</span>'
        +'<span class="linkgo">'+icon("ext")+'</span></a>';
    }).join("");
    html+='</div>';
  });
  return html;
}
function growNote(el){
  if(!el) return;
  el.style.height="auto";
  const max=Math.round(window.innerHeight*0.42);
  const h=Math.min(el.scrollHeight, max);
  el.style.height=h+"px";
  el.style.overflowY = el.scrollHeight>max+1 ? "auto" : "hidden";
}

/* ----------------------------- Firebase szinkron ----------------------------- */
function initFirebase(){
  if(!SYNC_ENABLED || typeof firebase==="undefined") return;
  try{
    firebase.initializeApp(firebaseConfig);
    fbAuth=firebase.auth();
    fbDb=firebase.firestore();
    fbAuth.onAuthStateChanged(onAuthChange);
  }catch(e){ console.error("Firebase init hiba",e); }
}
function onAuthChange(user){
  fbUser=user;
  if(fbUnsub){ fbUnsub(); fbUnsub=null; }
  if(user && fbDb){
    const ref=fbDb.collection("appdata").doc(user.uid);
    fbUnsub=ref.onSnapshot(snap=>{
      const d=snap.data();
      if(justSeeded){ justSeeded=false; setLocalTs(Date.now()); lastSyncedBlob=null; pushToCloud(); return; }
      if(!snap.exists || !d || !d.blob){ pushToCloud(); return; }
      if(d.blob===lastSyncedBlob) return;
      try{
        const remote=JSON.parse(d.blob);
        if(remote && remote.lists){
          const before=canonicalBlob(data);
          const merged=mergeData(data, remote);
          data=merged;
          if(!data.atts) data.atts={};
          const after=canonicalBlob(data);
          const remoteCanon=canonicalBlob(remote);
          if(after!==before){
            ensureOrders(); setLocalTs(Date.now()); saveLocal();
            const typing=/^(INPUT|TEXTAREA|SELECT)$/.test(((document.activeElement||{}).tagName)||"");
            if(!typing) render();
          } else { saveLocal(); }
          if(after!==remoteCanon) pushToCloud(); else lastSyncedBlob=d.blob;
        }
      }catch(e){ console.error("Felhő adat hiba",e); }
    }, err=>console.error("Szinkron hiba",err));
  }
  render();
}
function doAuth(kind){
  const emEl=document.getElementById("authemail"), pwEl=document.getElementById("authpass");
  const em=(emEl?emEl.value:"").trim(), pw=pwEl?pwEl.value:"";
  if(!em||!pw){ authError="Add meg az e-mailt és a jelszót."; renderAuthErr(); return; }
  authError="Folyamatban…"; renderAuthErr();
  const p = kind==="signup" ? fbAuth.createUserWithEmailAndPassword(em,pw) : fbAuth.signInWithEmailAndPassword(em,pw);
  p.then(()=>{ authOpen=false; authError=""; render(); })
   .catch(e=>{ authError=authMsg(e); renderAuthErr(); });
}
function authMsg(e){
  const c=(e&&e.code)||"";
  if(c==="auth/invalid-email") return "Érvénytelen e-mail-cím.";
  if(c==="auth/weak-password") return "A jelszó legalább 6 karakter legyen.";
  if(c==="auth/email-already-in-use") return "Ez az e-mail már regisztrálva van — inkább jelentkezz be.";
  if(c==="auth/invalid-credential"||c==="auth/wrong-password"||c==="auth/user-not-found") return "Hibás e-mail vagy jelszó.";
  if(c==="auth/network-request-failed") return "Nincs internetkapcsolat.";
  return (e&&e.message)||"Ismeretlen hiba.";
}
function renderAuthErr(){ const el=document.getElementById("autherr"); if(el) el.textContent=authError; }
function signOut(){ if(fbAuth) fbAuth.signOut().catch(e=>console.error(e)); }

/* ----------------------------- emlékeztetők ----------------------------- */
function requestNotify(){
  try{ if("Notification" in window && Notification.permission==="default") Notification.requestPermission(); }catch(e){}
}
function fireReminder(t){
  try{
    if("Notification" in window && Notification.permission==="granted"){
      new Notification("Emlékeztető", { body: t.title, tag: t.id });
      return;
    }
  }catch(e){}
  showToast("⏰ "+t.title);
}
function checkReminders(){
  if(!data||!data.tasks) return;
  const now=new Date();
  let changed=false;
  data.tasks.forEach(t=>{
    if(t.reminder && !t.done && !t.reminderFired){
      if(new Date(t.reminder) <= now){ fireReminder(t); t.reminderFired=true; changed=true; }
    }
  });
  if(changed) save();
}
function showToast(msg){
  let el=document.getElementById("toast");
  if(!el){ el=document.createElement("div"); el.id="toast"; el.className="toast"; document.body.appendChild(el); }
  el.textContent=msg; el.classList.add("show");
  clearTimeout(showToast._t); showToast._t=setTimeout(()=>el.classList.remove("show"), 6000);
}
function storageWorks(){
  try{ const k="__stest__"; localStorage.setItem(k,"1"); const ok=localStorage.getItem(k)==="1"; localStorage.removeItem(k); return ok; }catch(e){ return false; }
}
function warnNoStorage(){
  if(storageWorks()) return;
  let b=document.getElementById("storagewarn");
  if(!b){ b=document.createElement("div"); b.id="storagewarn"; b.className="storagewarn"; document.body.appendChild(b); }
  b.innerHTML='⚠️ A böngésző nem engedi a helyi mentést, ezért a feladatok nem maradnak meg.<br>iPhone: <b>Beállítások → Safari → „Minden süti letiltása"</b> legyen <b>kikapcsolva</b>, majd töltsd újra az oldalt.';
}

/* ----------------------------- indítás ----------------------------- */
async function bootstrap(){
  data=load();
  let ver=null; try{ ver=localStorage.getItem("todo-data-version"); }catch(e){}
  if(!data || ver!==DATA_VERSION){
    try{
      const res=await fetch(DATA_URL+"?ts="+Date.now(), {cache:"no-store"});
      if(res.ok){
        const seed=await res.json();
        if(seed && seed.lists && seed.lists.length && seed.tasks){
          data=seed; justSeeded=true;
          try{ localStorage.setItem("todo-data-version", DATA_VERSION); }catch(e){}
        }
      }
    }catch(e){ console.error("GitHub adat betöltés hiba", e); }
  }
  if(!data){ data=defaultData(); view={type:"list",key:data.lists[0].id}; saveLocal(); setLocalTs(0); }
  if(justSeeded){ view={type:"smart",key:"all"}; setLocalTs(Date.now()); saveLocal(); }
  ensureOrders();
  if(data.createdTotal==null){ data.createdTotal=data.tasks.length; saveLocal(); }
  if(!data.atts) data.atts={};
  try{ const old=JSON.parse(localStorage.getItem("todo-att-v1")||"null"); if(old){ Object.keys(old).forEach(tid=>{ if(!data.atts[tid]) data.atts[tid]=old[tid]; }); localStorage.removeItem("todo-att-v1"); saveLocal(); } }catch(e){}
  try{ darkMode = localStorage.getItem("todo-theme")==="dark"; }catch(e){}
  applyTheme();
  render();
  snapshotVersion();
  warnNoStorage();
  initFirebase();
  checkReminders();
  setInterval(checkReminders, 30000);
}
bootstrap();

window.addEventListener("blur", flushPush);
document.addEventListener("focusout", e=>{ const tg=(e.target&&e.target.tagName)||""; if(/^(INPUT|TEXTAREA)$/.test(tg)) snapshotVersion(); }, true);
document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="hidden"){ trackClose(); flushPush(); } });
